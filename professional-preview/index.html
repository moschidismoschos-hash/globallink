<!doctype html>
<html lang="el">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
  <meta name="theme-color" content="#020a16">
  <meta name="description" content="GlobalLink — επιλεγμένες αγορές και ακτοπλοϊκά ταξίδια σε μία οθόνη.">
  <title>GlobalLink — Αγορές &amp; Ταξίδια</title>
  <style>
    :root{
      --bg:#020914;
      --panel:rgba(7,30,58,.82);
      --panel2:rgba(8,40,77,.75);
      --line:rgba(76,174,255,.35);
      --text:#f7fbff;
      --muted:#aab9cb;
      --blue:#2f9bff;
      --cyan:#5cddff;
      --safe-top:env(safe-area-inset-top,0px);
      --safe-bottom:env(safe-area-inset-bottom,0px);
    }
    *{box-sizing:border-box}
    html,body{width:100%;height:100%;margin:0;overflow:hidden}
    body{
      color:var(--text);
      font-family:Inter,ui-sans-serif,system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI",Arial,sans-serif;
      background:
        radial-gradient(circle at 78% 18%,rgba(0,118,255,.17),transparent 25rem),
        linear-gradient(180deg,#010713 0%,#031329 58%,#020914 100%);
      overscroll-behavior:none;
    }
    body::before{
      content:"";
      position:fixed;inset:0;pointer-events:none;opacity:.48;
      background-image:
        radial-gradient(circle,rgba(112,204,255,.75) 0 1px,transparent 1.6px),
        radial-gradient(circle,rgba(255,255,255,.34) 0 1px,transparent 1.4px);
      background-size:89px 89px,147px 147px;
      background-position:12px 25px,44px 67px;
    }
    button,a{font:inherit}
    button{color:inherit}
    .app{
      position:relative;z-index:1;
      width:min(100%,760px);
      height:100dvh;
      margin:0 auto;
      padding:calc(8px + var(--safe-top)) 12px calc(8px + var(--safe-bottom));
      display:grid;
      grid-template-rows:auto minmax(0,1fr) auto;
      gap:8px;
      overflow:hidden;
    }
    .topbar{
      height:64px;
      padding:8px 10px;
      display:flex;align-items:center;justify-content:space-between;gap:10px;
      border:1px solid var(--line);border-radius:22px;
      background:linear-gradient(135deg,rgba(9,39,74,.88),rgba(3,20,41,.82));
      box-shadow:inset 0 1px 0 rgba(255,255,255,.07);
      backdrop-filter:blur(16px);
    }
    .brand{display:flex;align-items:center;gap:10px;min-width:0}
    .brand-icon{
      width:43px;height:43px;flex:0 0 auto;display:grid;place-items:center;
      border:2px solid var(--cyan);border-radius:50%;color:var(--cyan);
      box-shadow:0 0 18px rgba(76,210,255,.22);
    }
    .brand-icon svg{width:28px;height:28px}
    .brand-name{font-size:27px;font-weight:620;letter-spacing:-1.1px;white-space:nowrap}
    .brand-name span{color:#49a4ff}
    .top-actions{display:flex;gap:7px}
    .icon-btn{
      width:48px;height:48px;border:1px solid rgba(91,181,255,.34);border-radius:16px;
      display:grid;place-items:center;background:rgba(5,28,56,.78);cursor:pointer;
      -webkit-tap-highlight-color:transparent;
    }
    .icon-btn:active{transform:scale(.96)}
    .menu-lines{width:25px;display:grid;gap:5px}
    .menu-lines i{display:block;height:3px;border-radius:8px;background:#fff}
    .main{
      min-height:0;
      display:grid;
      grid-template-rows:auto auto minmax(0,1fr);
      gap:8px;
      overflow:hidden;
    }
    .hero{
      min-height:118px;
      padding:7px 7px 2px;
      display:grid;
      grid-template-columns:minmax(0,1fr) 128px;
      gap:8px;align-items:center;
    }
    .eyebrow{
      display:inline-flex;align-items:center;width:max-content;max-width:100%;
      padding:6px 10px;border:1px solid rgba(76,178,255,.62);border-radius:999px;
      color:#dff5ff;background:rgba(4,28,57,.56);
      font-size:10px;font-weight:850;letter-spacing:.07em;
    }
    .eyebrow b{color:#56c9ff;margin-left:4px}
    .hero h1{
      margin:8px 0 4px;
      font-size:clamp(29px,8.2vw,45px);
      line-height:.95;letter-spacing:-.045em;font-weight:790;
    }
    .hero h1 span{color:#459fff}
    .hero p{margin:0;color:var(--muted);font-size:13px;line-height:1.35}
    .globe-wrap{position:relative;width:128px;height:128px;display:grid;place-items:center}
    .globe-wrap::before,.globe-wrap::after{
      content:"";position:absolute;width:138px;height:58px;border:1.5px solid rgba(65,169,255,.5);
      border-radius:50%;filter:drop-shadow(0 0 6px rgba(0,142,255,.45));pointer-events:none;
    }
    .globe-wrap::before{transform:rotate(-18deg)}
    .globe-wrap::after{transform:rotate(38deg);width:128px;height:76px;opacity:.64}
    #globeCanvas{
      position:relative;z-index:2;width:112px;height:112px;border-radius:50%;
      filter:drop-shadow(0 0 20px rgba(42,171,255,.55));
    }
    .satellite{
      position:absolute;z-index:3;width:7px;height:7px;border-radius:50%;
      background:#68e2ff;box-shadow:0 0 12px #35d5ff;
      animation:satellite 5s linear infinite;
    }
    @keyframes satellite{
      from{transform:rotate(0deg) translateX(68px) rotate(0deg)}
      to{transform:rotate(360deg) translateX(68px) rotate(-360deg)}
    }
    .tabs{
      height:52px;padding:5px;display:grid;grid-template-columns:1fr 1fr;gap:5px;
      border:1px solid var(--line);border-radius:18px;background:rgba(3,21,43,.78);
    }
    .tab{
      border:0;border-radius:14px;background:transparent;color:#b8c6d7;
      display:flex;align-items:center;justify-content:center;gap:8px;
      font-size:16px;font-weight:780;cursor:pointer;
      -webkit-tap-highlight-color:transparent;
    }
    .tab.active{
      color:#fff;background:linear-gradient(135deg,#1f78dc,#124c9c);
      box-shadow:inset 0 1px 0 rgba(255,255,255,.18),0 7px 20px rgba(0,82,184,.24);
    }
    .count{
      width:30px;height:30px;display:grid;place-items:center;border-radius:50%;
      border:1px solid rgba(141,199,255,.18);background:rgba(115,166,220,.19);
      font-size:13px;
    }
    .carousel{
      min-height:0;position:relative;overflow:hidden;
      border:1px solid rgba(74,160,240,.19);border-radius:22px;
      background:linear-gradient(180deg,rgba(6,31,61,.5),rgba(3,16,33,.42));
      touch-action:none;
    }
    .card{
      --accent:#58caff;
      position:absolute;inset:8px 8px 34px;padding:18px;
      border:1px solid color-mix(in srgb,var(--accent) 58%,transparent);
      border-radius:20px;overflow:hidden;
      display:grid;grid-template-rows:auto 1fr auto;gap:10px;
      background:
        radial-gradient(circle at 35% 8%,color-mix(in srgb,var(--accent) 28%,transparent),transparent 45%),
        linear-gradient(145deg,color-mix(in srgb,var(--accent) 14%,#071a31),rgba(2,14,29,.95) 70%);
      box-shadow:inset 0 1px 0 rgba(255,255,255,.08),0 12px 28px rgba(0,0,0,.18);
      opacity:0;transform:translateX(22px) scale(.98);pointer-events:none;
      transition:opacity .28s ease,transform .28s ease;
    }
    .card.active{opacity:1;transform:none;pointer-events:auto}
    .card-head{display:flex;align-items:center;justify-content:space-between;gap:10px}
    .partner-icon{
      width:48px;height:48px;display:grid;place-items:center;border-radius:15px;
      border:1px solid rgba(255,255,255,.14);background:rgba(2,19,38,.52);color:#fff;
    }
    .partner-icon svg{width:28px;height:28px}
    .category{
      max-width:64%;padding:7px 10px;border:1px solid rgba(255,255,255,.12);
      border-radius:999px;background:rgba(2,18,38,.54);color:#d9e4ef;
      font-size:10px;font-weight:850;letter-spacing:.055em;text-align:center;
      white-space:nowrap;overflow:hidden;text-overflow:ellipsis;
    }
    .card-body{align-self:center}
    .wordmark{
      margin:0 0 6px;font-size:clamp(31px,9vw,48px);line-height:.94;
      font-weight:900;letter-spacing:-.055em;color:#fff;
    }
    .wordmark span{color:var(--accent)}
    .wordmark.serif{font-family:Georgia,"Times New Roman",serif;letter-spacing:.035em;font-weight:700}
    .description{margin:0;color:#bdcad8;font-size:15px;line-height:1.38}
    .card-foot{display:flex;align-items:center;justify-content:space-between;gap:10px}
    .cta{
      min-height:48px;padding:0 17px;border-radius:14px;
      display:flex;align-items:center;justify-content:center;
      color:#fff;background:linear-gradient(135deg,color-mix(in srgb,var(--accent) 77%,#1268cc),#13539f);
      border:1px solid color-mix(in srgb,var(--accent) 68%,transparent);
      font-size:15px;font-weight:820;text-decoration:none;text-align:center;
      box-shadow:inset 0 1px 0 rgba(255,255,255,.16);
      -webkit-tap-highlight-color:transparent;
    }
    .cta:active{transform:scale(.98)}
    .arrow-btn{
      width:46px;height:46px;flex:0 0 auto;border-radius:50%;
      border:1px solid rgba(125,197,255,.38);background:rgba(3,21,43,.7);
      display:grid;place-items:center;color:#fff;font-size:24px;cursor:pointer;
    }
    .arrow-btn:disabled{opacity:.35}
    .nav-row{
      position:absolute;left:10px;right:10px;bottom:5px;height:25px;
      display:grid;grid-template-columns:38px 1fr 38px;align-items:center;
    }
    .mini-arrow{
      width:32px;height:25px;border:0;background:transparent;color:#92b0cc;
      font-size:22px;cursor:pointer;
    }
    .dots{display:flex;justify-content:center;gap:7px}
    .dot{
      width:7px;height:7px;padding:0;border:0;border-radius:50%;
      background:#3a5875;cursor:pointer;
    }
    .dot.active{width:18px;border-radius:8px;background:#55cfff}
    .footer{
      height:34px;display:flex;align-items:center;justify-content:center;gap:8px;
      color:#92a7bc;font-size:11px;text-align:center;
    }
    .info-btn{border:0;background:transparent;color:#82caff;text-decoration:underline;cursor:pointer}
    .modal{
      position:fixed;inset:0;z-index:30;display:none;place-items:center;padding:18px;
      background:rgba(0,7,16,.74);backdrop-filter:blur(10px);
    }
    .modal.open{display:grid}
    .modal-card{
      width:min(100%,480px);max-height:min(520px,80dvh);overflow:auto;
      padding:20px;border:1px solid rgba(84,180,255,.42);border-radius:22px;
      background:linear-gradient(155deg,#092546,#041225);box-shadow:0 24px 70px rgba(0,0,0,.46);
    }
    .modal-top{display:flex;align-items:center;justify-content:space-between;gap:12px}
    .modal h2{margin:0;font-size:23px}
    .close{width:40px;height:40px;border:1px solid var(--line);border-radius:13px;background:#061b35;cursor:pointer}
    .modal p{color:#bfccda;line-height:1.55;font-size:15px}
    .steps{display:grid;gap:10px;margin-top:15px}
    .step{padding:12px;border:1px solid rgba(84,180,255,.24);border-radius:14px;background:rgba(5,24,48,.64)}
    @media(max-height:700px){
      .topbar{height:58px}
      .brand-icon{width:39px;height:39px}
      .brand-name{font-size:24px}
      .icon-btn{width:43px;height:43px}
      .hero{min-height:100px;grid-template-columns:minmax(0,1fr) 108px}
      .hero h1{font-size:clamp(27px,7.4vw,38px)}
      .hero p{display:none}
      .globe-wrap{width:108px;height:108px}
      #globeCanvas{width:94px;height:94px}
      .globe-wrap::before{width:115px;height:46px}
      .globe-wrap::after{width:108px;height:63px}
      .card{padding:14px;gap:7px}
      .partner-icon{width:42px;height:42px}
      .wordmark{font-size:clamp(28px,8vw,41px)}
      .description{font-size:13px}
      .cta{min-height:43px;font-size:14px}
    }
    @media(min-width:700px){
      .app{padding-left:18px;padding-right:18px}
      .hero{grid-template-columns:minmax(0,1fr) 155px}
      .globe-wrap{width:150px;height:150px}
      #globeCanvas{width:132px;height:132px}
      .card{inset:10px 55px 35px}
    }
  </style>
</head>
<body>
  <div class="app">
    <header class="topbar">
      <div class="brand">
        <span class="brand-icon" aria-hidden="true">
          <svg viewBox="0 0 48 48" fill="none" stroke="currentColor" stroke-width="2.5">
            <circle cx="24" cy="24" r="18"/>
            <path d="M6 24h36M24 6c7 7 10 12 10 18s-3 11-10 18c-7-7-10-12-10-18S17 13 24 6z"/>
          </svg>
        </span>
        <span class="brand-name">Global<span>Link</span></span>
      </div>
      <div class="top-actions">
        <button class="icon-btn" id="infoOpen" type="button" aria-label="Πληροφορίες">ⓘ</button>
        <button class="icon-btn" id="menuOpen" type="button" aria-label="Μενού">
          <span class="menu-lines"><i></i><i></i><i></i></span>
        </button>
      </div>
    </header>

    <main class="main">
      <section class="hero">
        <div>
          <div class="eyebrow">ΕΠΙΛΕΓΜΕΝΕΣ <b>ΣΥΝΕΡΓΑΣΙΕΣ</b></div>
          <h1>Αγορές και <span>ταξίδια</span><br>σε ένα μέρος</h1>
          <p>Επίλεξε εταιρεία και συνέχισε στον ιστότοπό της.</p>
        </div>
        <div class="globe-wrap" aria-label="Περιστρεφόμενη Γη">
          <canvas id="globeCanvas" width="180" height="180"></canvas>
          <span class="satellite"></span>
        </div>
      </section>

      <nav class="tabs" aria-label="Κατηγορίες">
        <button class="tab active" type="button" data-category="shopping" aria-selected="true">
          🛍 Αγορές <span class="count">5</span>
        </button>
        <button class="tab" type="button" data-category="travel" aria-selected="false">
          ✈ Ταξίδια <span class="count">2</span>
        </button>
      </nav>

      <section class="carousel" id="carousel" aria-live="polite">
        <article class="card active" id="partnerCard">
          <div class="card-head">
            <span class="partner-icon" aria-hidden="true">
              <svg viewBox="0 0 64 64" fill="none" stroke="currentColor" stroke-width="3">
                <path d="M13 22h38l-3 30H16l-3-30Z"/><path d="M23 22v-4a9 9 0 0 1 18 0v4"/>
              </svg>
            </span>
            <span class="category" id="partnerCategory"></span>
          </div>
          <div class="card-body">
            <div class="wordmark" id="partnerMark"></div>
            <p class="description" id="partnerDescription"></p>
          </div>
          <div class="card-foot">
            <a class="cta" id="partnerLink" href="#" target="_blank" rel="noopener sponsored"></a>
            <button class="arrow-btn" id="nextCard" type="button" aria-label="Επόμενη εταιρεία">→</button>
          </div>
        </article>
        <div class="nav-row">
          <button class="mini-arrow" id="prevCard" type="button" aria-label="Προηγούμενη εταιρεία">‹</button>
          <div class="dots" id="dots"></div>
          <button class="mini-arrow" id="nextCardBottom" type="button" aria-label="Επόμενη εταιρεία">›</button>
        </div>
      </section>
    </main>

    <footer class="footer">
      <span>Οι σύνδεσμοι μπορεί να αποφέρουν προμήθεια χωρίς επιπλέον κόστος.</span>
      <button class="info-btn" id="disclosureOpen" type="button">Πληροφορίες</button>
    </footer>
  </div>

  <div class="modal" id="modal" role="dialog" aria-modal="true" aria-labelledby="modalTitle">
    <div class="modal-card">
      <div class="modal-top">
        <h2 id="modalTitle">Πώς λειτουργεί</h2>
        <button class="close" id="modalClose" type="button" aria-label="Κλείσιμο">✕</button>
      </div>
      <div id="modalContent"></div>
    </div>
  </div>

  <script>
    
const PARTNERS = {
  shopping: [
    {
      name: 'AliExpress',
      category: 'Διεθνείς αγορές',
      description: 'Μεγάλη ποικιλία προϊόντων.',
      action: 'Επισκέψου το κατάστημα',
      accent: '#ff7138',
      mark: 'Ali<span>Express</span>',
      url: 'https://go.linkwi.se/z/11183-0/CD28424/?lnkurl=https%3A%2F%2Fmbest.aliexpress.com%2F%3Faff_fcid%3Dbfcb09d34f5043418bcc9716811fb6f7-1784578478913-08891-j6RrMzM%26aff_fsk%3Dj6RrMzM%26aff_platform%3Daaf%26sk%3Dj6RrMzM%26aff_trace_key%3Dbfcb09d34f5043418bcc9716811fb6f7-1784578478913-08891-j6RrMzM%26terminal_id%3D5a3158914b624c63ae53a1583c8df889%26afSmartRedirect%3Dy'
    },
    {
      name: 'Luigi',
      category: 'Μόδα',
      description: 'Μόδα και υποδήματα.',
      action: 'Επισκέψου το κατάστημα',
      accent: '#ef6d86',
      mark: 'LUIGI',
      serif: true,
      url: 'https://go.linkwi.se/z/11625-0/CD28424/?lnkurl=https%3A%2F%2Fwww.luigi.com.gr%2F'
    },
    {
      name: 'Superpanes',
      category: 'Βρεφικά',
      description: 'Προϊόντα για τις ανάγκες της οικογένειας.',
      action: 'Επισκέψου το κατάστημα',
      accent: '#5ad8ff',
      mark: 'super<span>panes</span>',
      url: 'https://go.linkwi.se/z/12056-0/CD28424/?lnkurl=https%3A%2F%2Fsuperpanes.gr%2F'
    },
    {
      name: 'Greece and Grapes',
      category: 'Ελληνικά κρασιά',
      description: 'Επιλεγμένα ελληνικά κρασιά.',
      action: 'Δες τις επιλογές',
      accent: '#d5a7ff',
      mark: 'GREECE &amp; GRAPES',
      serif: true,
      url: 'https://go.linkwi.se/z/12365-0/CD28424/?lnkurl=https%3A%2F%2Fwww.greeceandgrapes.com%2F'
    },
    {
      name: 'My Cretan Goods',
      category: 'Κρητικά προϊόντα',
      description: 'Αυθεντικές γεύσεις από την Κρήτη.',
      action: 'Επισκέψου το κατάστημα',
      accent: '#77e5a6',
      mark: 'My Cretan <span>Goods</span>',
      url: 'https://go.linkwi.se/z/12587-0/CD28424/?lnkurl=https%3A%2F%2Fwww.mycretangoods.com%2Fel-gr'
    }
  ],
  travel: [
    {
      name: 'LetsFerry',
      category: 'Ακτοπλοϊκά',
      description: 'Αναζήτησε δρομολόγια και εισιτήρια.',
      action: 'Αναζήτησε εισιτήρια',
      accent: '#59d7ff',
      mark: 'lets<span>ferry</span>',
      url: 'https://go.linkwi.se/z/11739-0/CD28424/?lnkurl=https%3A%2F%2Fwww.letsferry.com%2Fel'
    },
    {
      name: 'Ferryscanner',
      category: 'Σύγκριση δρομολογίων',
      description: 'Σύγκρινε ακτοπλοϊκά δρομολόγια.',
      action: 'Σύγκρινε εισιτήρια',
      accent: '#55dfd4',
      mark: 'Ferry<span>scanner</span>',
      url: 'https://go.linkwi.se/z/12865-0/CD28424/?lnkurl=https%3A%2F%2Fwww.ferryscanner.com%2Fel%2Fferry'
    }
  ]
};


    const state = { category: 'shopping', index: 0 };
    const card = document.getElementById('partnerCard');
    const categoryEl = document.getElementById('partnerCategory');
    const markEl = document.getElementById('partnerMark');
    const descriptionEl = document.getElementById('partnerDescription');
    const linkEl = document.getElementById('partnerLink');
    const dotsEl = document.getElementById('dots');
    const tabs = [...document.querySelectorAll('.tab')];

    function iconFor(category) {
      return category === 'travel'
        ? '<svg viewBox="0 0 64 64" fill="none" stroke="currentColor" stroke-width="3"><path d="M13 31h38l-6 16H19l-6-16Z"/><path d="M20 31V18h24v13"/><path d="M8 52c5 4 10 4 15 0 5 4 10 4 15 0 5 4 10 4 15 0"/></svg>'
        : '<svg viewBox="0 0 64 64" fill="none" stroke="currentColor" stroke-width="3"><path d="M13 22h38l-3 30H16l-3-30Z"/><path d="M23 22v-4a9 9 0 0 1 18 0v4"/></svg>';
    }

    function renderCard(direction = 1) {
      const list = PARTNERS[state.category];
      state.index = (state.index + list.length) % list.length;
      const partner = list[state.index];

      card.classList.remove('active');
      card.style.transform = `translateX(${direction * 22}px) scale(.98)`;

      window.setTimeout(() => {
        card.style.setProperty('--accent', partner.accent);
        card.querySelector('.partner-icon').innerHTML = iconFor(state.category);
        categoryEl.textContent = partner.category;
        markEl.innerHTML = partner.mark;
        markEl.classList.toggle('serif', Boolean(partner.serif));
        descriptionEl.textContent = partner.description;
        linkEl.textContent = partner.action;
        linkEl.href = partner.url;
        linkEl.setAttribute('aria-label', `${partner.action} — ${partner.name}`);

        dotsEl.innerHTML = list.map((_, index) =>
          `<button class="dot ${index === state.index ? 'active' : ''}" type="button" data-index="${index}" aria-label="Εταιρεία ${index + 1}"></button>`
        ).join('');

        dotsEl.querySelectorAll('.dot').forEach(dot => {
          dot.addEventListener('click', () => {
            const target = Number(dot.dataset.index);
            const direction = target >= state.index ? 1 : -1;
            state.index = target;
            renderCard(direction);
          });
        });

        requestAnimationFrame(() => {
          card.style.transform = '';
          card.classList.add('active');
        });
      }, 140);
    }

    function move(step) {
      state.index += step;
      renderCard(step);
    }

    document.getElementById('nextCard').addEventListener('click', () => move(1));
    document.getElementById('nextCardBottom').addEventListener('click', () => move(1));
    document.getElementById('prevCard').addEventListener('click', () => move(-1));

    tabs.forEach(tab => {
      tab.addEventListener('click', () => {
        tabs.forEach(item => {
          item.classList.remove('active');
          item.setAttribute('aria-selected', 'false');
        });
        tab.classList.add('active');
        tab.setAttribute('aria-selected', 'true');
        state.category = tab.dataset.category;
        state.index = 0;
        renderCard(1);
      });
    });

    let startX = null;
    const carousel = document.getElementById('carousel');
    carousel.addEventListener('pointerdown', event => {
      startX = event.clientX;
      carousel.setPointerCapture(event.pointerId);
    });
    carousel.addEventListener('pointerup', event => {
      if (startX === null) return;
      const distance = event.clientX - startX;
      startX = null;
      if (Math.abs(distance) > 42) move(distance < 0 ? 1 : -1);
    });
    carousel.addEventListener('pointercancel', () => { startX = null; });

    const modal = document.getElementById('modal');
    const modalTitle = document.getElementById('modalTitle');
    const modalContent = document.getElementById('modalContent');

    function openModal(type) {
      if (type === 'disclosure') {
        modalTitle.textContent = 'Δήλωση συνεργατών';
        modalContent.innerHTML = '<p>Ορισμένοι σύνδεσμοι είναι σύνδεσμοι συνεργατών. Ενδέχεται να λάβω προμήθεια από μια έγκυρη αγορά ή κράτηση, χωρίς επιπλέον κόστος για εσένα.</p><p>Η αγορά ή η κράτηση ολοκληρώνεται απευθείας στον ιστότοπο της αντίστοιχης εταιρείας.</p>';
      } else {
        modalTitle.textContent = 'Πώς λειτουργεί';
        modalContent.innerHTML = '<div class="steps"><div class="step"><strong>1. Επίλεξε κατηγορία</strong><br>Αγορές ή ταξίδια.</div><div class="step"><strong>2. Άλλαξε εταιρεία</strong><br>Με τα βελάκια, τις τελείες ή σύροντας την κάρτα.</div><div class="step"><strong>3. Συνέχισε στην εταιρεία</strong><br>Πάτησε το κουμπί της κάρτας.</div></div>';
      }
      modal.classList.add('open');
    }

    document.getElementById('infoOpen').addEventListener('click', () => openModal('disclosure'));
    document.getElementById('disclosureOpen').addEventListener('click', () => openModal('disclosure'));
    document.getElementById('menuOpen').addEventListener('click', () => openModal('how'));
    document.getElementById('modalClose').addEventListener('click', () => modal.classList.remove('open'));
    modal.addEventListener('click', event => {
      if (event.target === modal) modal.classList.remove('open');
    });
    document.addEventListener('keydown', event => {
      if (event.key === 'Escape') modal.classList.remove('open');
    });

    // Πραγματική περιστροφή σφαίρας με Canvas.
    const globeCanvas = document.getElementById('globeCanvas');
    const globeContext = globeCanvas.getContext('2d', { alpha: true });
    const globeSize = globeCanvas.width;
    const radius = globeSize / 2;
    const output = globeContext.createImageData(globeSize, globeSize);
    const textureImage = new Image();
    let texturePixels = null;
    let textureWidth = 0;
    let textureHeight = 0;
    let rotation = 0;
    let previousTime = performance.now();

    const pixelMap = [];
    for (let y = 0; y < globeSize; y++) {
      for (let x = 0; x < globeSize; x++) {
        const nx = (x - radius) / radius;
        const ny = (y - radius) / radius;
        const distance = nx * nx + ny * ny;
        if (distance <= 1) {
          const nz = Math.sqrt(1 - distance);
          const latitude = Math.asin(-ny);
          const longitudeBase = Math.atan2(nx, nz);
          const light = Math.max(.34, .28 + .82 * Math.max(0, nx * -.38 + ny * -.32 + nz * .86));
          pixelMap.push({ x, y, latitude, longitudeBase, light, edge: Math.pow(nz, .32) });
        }
      }
    }

    function drawGlobe(time) {
      if (!texturePixels) {
        requestAnimationFrame(drawGlobe);
        return;
      }
      const delta = Math.min(40, time - previousTime);
      previousTime = time;
      rotation = (rotation + delta * 0.00042) % (Math.PI * 2);

      output.data.fill(0);
      for (const pixel of pixelMap) {
        let longitude = pixel.longitudeBase + rotation;
        longitude = ((longitude / (Math.PI * 2)) + .5) % 1;
        if (longitude < 0) longitude += 1;
        const latitudeNormalized = .5 - pixel.latitude / Math.PI;
        const tx = Math.min(textureWidth - 1, Math.floor(longitude * textureWidth));
        const ty = Math.min(textureHeight - 1, Math.floor(latitudeNormalized * textureHeight));
        const sourceIndex = (ty * textureWidth + tx) * 4;
        const targetIndex = (pixel.y * globeSize + pixel.x) * 4;
        const shade = pixel.light * pixel.edge;

        output.data[targetIndex] = Math.min(255, texturePixels[sourceIndex] * shade + 7);
        output.data[targetIndex + 1] = Math.min(255, texturePixels[sourceIndex + 1] * shade + 14);
        output.data[targetIndex + 2] = Math.min(255, texturePixels[sourceIndex + 2] * shade + 25);
        output.data[targetIndex + 3] = 255;
      }

      globeContext.putImageData(output, 0, 0);
      globeContext.globalCompositeOperation = 'source-atop';
      const glow = globeContext.createRadialGradient(58, 48, 2, 90, 90, 90);
      glow.addColorStop(0, 'rgba(255,255,255,.20)');
      glow.addColorStop(.32, 'rgba(86,190,255,.05)');
      glow.addColorStop(1, 'rgba(0,24,60,.18)');
      globeContext.fillStyle = glow;
      globeContext.fillRect(0, 0, globeSize, globeSize);
      globeContext.globalCompositeOperation = 'source-over';

      requestAnimationFrame(drawGlobe);
    }

    textureImage.onload = () => {
      const textureCanvas = document.createElement('canvas');
      textureCanvas.width = textureImage.naturalWidth;
      textureCanvas.height = textureImage.naturalHeight;
      const textureContext = textureCanvas.getContext('2d', { willReadFrequently: true });
      textureContext.drawImage(textureImage, 0, 0);
      const textureData = textureContext.getImageData(0, 0, textureCanvas.width, textureCanvas.height);
      texturePixels = textureData.data;
      textureWidth = textureCanvas.width;
      textureHeight = textureCanvas.height;
      requestAnimationFrame(drawGlobe);
    };
    textureImage.src = 'assets/earth-texture.webp';

    renderCard();
  </script>
</body>
</html>
