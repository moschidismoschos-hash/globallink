<!DOCTYPE html>
<html lang="el">
<head>
  <meta charset="UTF-8">

  <meta
    name="viewport"
    content="width=device-width, initial-scale=1.0"
  >

  <meta
    name="description"
    content="GlobalLink — προϊόντα από όλο τον κόσμο."
  >

  <title>GlobalLink — by Gavriil Moschidis</title>

  <style>
    :root {
      --dark-blue: #052d7c;
      --blue: #0878ff;
      --light-blue: #26c9ff;
      --page-background: #eef9ff;
      --glass-border: rgba(255, 255, 255, 0.98);
      --shadow: rgba(0, 91, 200, 0.20);
    }

    * {
      box-sizing: border-box;
      scroll-behavior: smooth;
    }

    html,
    body {
      width: 100%;
      min-height: 100%;
      margin: 0;
      padding: 0;
    }

    body {
      overflow-x: hidden;
      color: var(--dark-blue);
      font-family: Arial, Helvetica, sans-serif;

      background:
        radial-gradient(
          circle at 10% 0%,
          rgba(59, 194, 255, 0.25),
          transparent 31%
        ),
        radial-gradient(
          circle at 92% 10%,
          rgba(23, 110, 255, 0.18),
          transparent 32%
        ),
        linear-gradient(
          180deg,
          #fbfeff 0%,
          var(--page-background) 100%
        );
    }

    button,
    select,
    input {
      font: inherit;
    }

    button,
    select,
    a {
      -webkit-tap-highlight-color: transparent;
    }

    .top-header {
      position: sticky;
      top: 0;
      z-index: 1000;

      width: 100%;
      padding: 7px;

      background: rgba(237, 248, 255, 0.84);

      backdrop-filter: blur(22px);
      -webkit-backdrop-filter: blur(22px);
    }

    .top-inner {
      width: min(1180px, 100%);
      min-height: 72px;
      margin: 0 auto;
      padding: 9px 13px;

      display: grid;
      grid-template-columns: auto 1fr auto;
      align-items: center;
      gap: 14px;

      border: 1px solid var(--glass-border);
      border-radius: 27px;

      background:
        linear-gradient(
          135deg,
          rgba(255, 255, 255, 0.92),
          rgba(218, 242, 255, 0.67)
        );

      box-shadow:
        inset 0 2px 5px rgba(255, 255, 255, 1),
        inset 0 -8px 24px rgba(28, 143, 255, 0.08),
        0 12px 34px var(--shadow);
    }

    .brand {
      min-width: 0;

      display: flex;
      align-items: center;
      gap: 10px;

      color: var(--dark-blue);
      text-decoration: none;
    }

    .liquid-logo {
      position: relative;

      width: 49px;
      height: 49px;
      flex: 0 0 49px;

      border-radius: 50%;

      background:
        radial-gradient(
          circle at 28% 20%,
          #ffffff 0%,
          #9eeaff 19%,
          #20a8ff 43%,
          #0758dd 70%,
          #032b99 100%
        );

      box-shadow:
        inset 5px 6px 11px rgba(255, 255, 255, 0.92),
        inset -5px -6px 13px rgba(0, 28, 131, 0.48),
        0 8px 22px rgba(0, 103, 255, 0.40);
    }

    .liquid-logo::before,
    .liquid-logo::after {
      content: "";

      position: absolute;
      left: 7px;
      top: 16px;

      width: 35px;
      height: 14px;

      border: 4px solid rgba(239, 253, 255, 0.90);
      border-radius: 50%;

      box-shadow:
        0 0 9px rgba(0, 198, 255, 0.90),
        inset 0 0 7px rgba(0, 91, 255, 0.75);
    }

    .liquid-logo::before {
      transform: rotate(38deg);
    }

    .liquid-logo::after {
      transform: rotate(-38deg);
    }

    .brand-name {
      display: block;

      font-size: 25px;
      line-height: 1;
      font-weight: 900;
      letter-spacing: -0.8px;
      white-space: nowrap;
    }

    .brand-owner {
      display: block;

      margin-top: 4px;

      color: #0874e9;
      font-size: 12px;
      font-weight: 700;
      white-space: nowrap;
    }

    .desktop-nav {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 3px;
    }

    .desktop-nav a {
      padding: 10px 9px;

      border-radius: 14px;

      color: #092e72;
      text-decoration: none;
      font-size: 11px;
      font-weight: 900;
      white-space: nowrap;

      transition:
        transform 0.2s ease,
        background 0.2s ease,
        box-shadow 0.2s ease;
    }

    .desktop-nav a:hover,
    .desktop-nav a:focus {
      outline: none;
      transform: translateY(-1px);

      background: rgba(255, 255, 255, 0.88);

      box-shadow:
        inset 0 1px 3px white,
        0 7px 18px rgba(0, 97, 220, 0.13);
    }

    .actions {
      display: flex;
      align-items: center;
      justify-content: flex-end;
      gap: 6px;
    }

    .language {
      height: 40px;
      max-width: 112px;
      padding: 0 8px;

      border: 1px solid var(--glass-border);
      border-radius: 15px;
      outline: none;

      color: #073678;
      background: rgba(255, 255, 255, 0.78);

      font-size: 11px;
      font-weight: 800;

      box-shadow:
        inset 0 1px 3px white,
        0 7px 18px rgba(0, 94, 210, 0.12);
    }

    .icon-button {
      width: 40px;
      height: 40px;
      padding: 0;
      flex: 0 0 40px;

      display: grid;
      place-items: center;

      border: 1px solid var(--glass-border);
      border-radius: 50%;
      cursor: pointer;

      color: #063681;
      background: rgba(255, 255, 255, 0.74);

      box-shadow:
        inset 0 1px 3px white,
        0 7px 18px rgba(0, 94, 210, 0.13);

      transition:
        transform 0.2s ease,
        color 0.2s ease,
        background 0.2s ease;
    }

    .icon-button:hover,
    .icon-button:focus {
      outline: none;

      color: #008cff;
      transform: translateY(-1px);

      background: rgba(255, 255, 255, 0.94);
    }

    .icon-button svg {
      width: 20px;
      height: 20px;

      fill: none;
      stroke: currentColor;
      stroke-width: 2;
      stroke-linecap: round;
      stroke-linejoin: round;
    }

    .menu-button {
      display: none;
    }

    .mobile-nav {
      display: none;

      width: min(1180px, 100%);
      margin: 7px auto 0;
      padding: 10px;

      grid-template-columns: repeat(2, 1fr);
      gap: 7px;

      border: 1px solid var(--glass-border);
      border-radius: 22px;

      background: rgba(242, 251, 255, 0.96);

      backdrop-filter: blur(22px);
      -webkit-backdrop-filter: blur(22px);

      box-shadow:
        inset 0 1px 3px white,
        0 14px 35px rgba(0, 74, 180, 0.21);
    }

    .mobile-nav.open {
      display: grid;
    }

    .mobile-nav a {
      min-height: 43px;
      padding: 10px;

      display: flex;
      align-items: center;
      justify-content: center;

      border: 1px solid rgba(255, 255, 255, 0.97);
      border-radius: 14px;

      color: #073477;
      text-align: center;
      text-decoration: none;
      font-size: 11px;
      font-weight: 900;

      background: rgba(255, 255, 255, 0.73);

      box-shadow:
        inset 0 1px 3px white,
        0 6px 15px rgba(0, 94, 210, 0.10);
    }

    .search-panel {
      position: fixed;
      z-index: 1300;
      top: 92px;
      left: 50%;

      width: min(560px, calc(100% - 24px));
      padding: 12px;

      display: none;
      gap: 8px;

      border: 1px solid var(--glass-border);
      border-radius: 22px;

      background: rgba(241, 251, 255, 0.96);

      backdrop-filter: blur(24px);
      -webkit-backdrop-filter: blur(24px);

      box-shadow:
        inset 0 1px 3px white,
        0 20px 55px rgba(0, 68, 170, 0.28);

      transform: translateX(-50%);
    }

    .search-panel.open {
      display: flex;
    }

    .search-panel input {
      width: 100%;
      min-width: 0;
      padding: 13px 14px;

      border: 1px solid rgba(0, 116, 255, 0.19);
      border-radius: 15px;
      outline: none;

      color: var(--dark-blue);
      background: rgba(255, 255, 255, 0.92);
    }

    .search-panel input:focus {
      border-color: rgba(0, 121, 255, 0.55);

      box-shadow:
        0 0 0 4px rgba(0, 121, 255, 0.10);
    }

    .search-submit {
      padding: 0 17px;

      border: 0;
      border-radius: 15px;
      cursor: pointer;

      color: white;
      font-size: 12px;
      font-weight: 900;

      background:
        linear-gradient(
          135deg,
          var(--blue),
          var(--light-blue)
        );

      box-shadow:
        0 8px 21px rgba(0, 108, 255, 0.31);
    }

    .hero-design {
      position: relative;

      width: min(1100px, 100%);
      aspect-ratio: 1024 / 474;
      margin: 0 auto;

      overflow: hidden;
    }

    .hero-image {
      position: absolute;
      z-index: 1;
      left: 0;
      top: 0;

      width: 100%;
      height: auto;
      display: block;

      transform: translateY(-6.515%);
    }

    .earth-ring {
      position: absolute;
      z-index: 4;

      left: 52%;
      top: 1%;

      width: 42%;
      aspect-ratio: 1;

      border: 2px solid rgba(137, 229, 255, 0.40);
      border-radius: 50%;

      box-shadow:
        0 0 16px rgba(49, 195, 255, 0.74),
        inset 0 0 15px rgba(255, 255, 255, 0.40);

      pointer-events: none;

      animation:
        earthRingPulse
        3.5s
        ease-in-out
        infinite;
    }

    .earth-wrapper {
      position: absolute;
      z-index: 5;

      left: 54.6%;
      top: 4%;

      width: 36.8%;
      aspect-ratio: 1;

      overflow: hidden;

      border: 2px solid rgba(225, 251, 255, 0.92);
      border-radius: 50%;

      background:
        radial-gradient(
          circle at 34% 25%,
          #f7ffff 0%,
          #9deaff 20%,
          #209dff 47%,
          #0753ce 73%,
          #031e78 100%
        );

      box-shadow:
        inset 7px 8px 17px rgba(255, 255, 255, 0.65),
        inset -12px -13px 24px rgba(0, 22, 101, 0.38),
        0 0 13px rgba(255, 255, 255, 0.95),
        0 0 30px rgba(32, 184, 255, 0.80),
        0 18px 35px rgba(0, 75, 190, 0.34);

      pointer-events: none;
    }

    .earth-wrapper::before {
      content: "";

      position: absolute;
      z-index: 7;
      inset: 0;

      border-radius: 50%;

      background:
        radial-gradient(
          circle at 28% 20%,
          rgba(255, 255, 255, 0.50),
          transparent 36%
        ),
        radial-gradient(
          circle at 70% 74%,
          transparent 44%,
          rgba(0, 17, 76, 0.32) 100%
        );

      pointer-events: none;
    }

    .earth-wrapper::after {
      content: "";

      position: absolute;
      z-index: 8;

      left: 13%;
      top: 7%;

      width: 27%;
      height: 52%;

      border-radius: 50%;

      background:
        linear-gradient(
          110deg,
          rgba(255, 255, 255, 0.44),
          rgba(255, 255, 255, 0.03)
        );

      filter: blur(2px);
      transform: rotate(26deg);

      pointer-events: none;
    }

    .earth-video {
      position: absolute;
      z-index: 6;

      left: 50%;
      top: 50%;

      width: 122%;
      height: 122%;

      object-fit: cover;
      object-position: center;

      transform:
        translate(-50%, -50%)
        scale(1.18);

      filter:
        brightness(1.24)
        saturate(1.26)
        contrast(1.05);

      mix-blend-mode: screen;

      pointer-events: none;
    }

    .lower-design {
      position: relative;

      width: min(1100px, 100%);
      aspect-ratio: 1024 / 960;
      margin: 0 auto;

      overflow: hidden;
    }

    .lower-image {
      position: absolute;
      z-index: 1;
      left: 0;
      top: 0;

      width: 100%;
      height: auto;
      display: block;

      transform: translateY(-37.46%);
    }

    /*
      Αόρατα πραγματικά κουμπιά ακριβώς
      επάνω στις έξι κάρτες κατηγοριών.
    */

    .category-buttons {
      position: absolute;
      z-index: 10;

      left: 1.55%;
      right: 1.55%;
      top: 0.3%;
      height: 18.2%;

      display: grid;
      grid-template-columns: repeat(6, 1fr);
      gap: 1.25%;
    }

    .category-button {
      position: relative;

      width: 100%;
      height: 100%;
      padding: 0;

      border: 2px solid transparent;
      border-radius: 22px;

      cursor: pointer;

      color: transparent;
      background: transparent;

      transition:
        border-color 0.22s ease,
        box-shadow 0.22s ease,
        transform 0.22s ease,
        background 0.22s ease;
    }

    .category-button:hover,
    .category-button:focus-visible {
      outline: none;

      border-color: rgba(62, 193, 255, 0.75);

      background:
        linear-gradient(
          135deg,
          rgba(255, 255, 255, 0.08),
          rgba(0, 145, 255, 0.08)
        );

      box-shadow:
        inset 0 0 18px rgba(255, 255, 255, 0.55),
        0 0 20px rgba(0, 145, 255, 0.38);

      transform: translateY(-2px);
    }

    .category-button.selected {
      border-color: rgba(0, 119, 255, 0.90);

      background:
        linear-gradient(
          135deg,
          rgba(255, 255, 255, 0.12),
          rgba(0, 137, 255, 0.12)
        );

      box-shadow:
        inset 0 0 20px rgba(255, 255, 255, 0.70),
        0 0 9px rgba(255, 255, 255, 0.95),
        0 0 23px rgba(0, 125, 255, 0.62);
    }

    .category-button.selected::after {
      content: "✓";

      position: absolute;
      right: 8%;
      top: 7%;

      width: 24px;
      height: 24px;

      display: grid;
      place-items: center;

      border: 1px solid rgba(255, 255, 255, 0.96);
      border-radius: 50%;

      color: white;
      font-size: 14px;
      font-weight: 900;

      background:
        linear-gradient(
          135deg,
          #0878ff,
          #26c9ff
        );

      box-shadow:
        inset 0 1px 3px rgba(255, 255, 255, 0.80),
        0 5px 13px rgba(0, 102, 235, 0.42);
    }

    .section-anchor {
      position: absolute;
      left: 0;

      width: 1px;
      height: 1px;

      scroll-margin-top: 92px;
    }

    #home {
      top: 0;
    }

    #categories {
      top: 0;
    }

    #products {
      top: 24%;
    }

    #about {
      top: 72%;
    }

    #contact {
      top: 88%;
    }

    .toast {
      position: fixed;
      z-index: 1600;
      left: 50%;
      bottom: 24px;

      width: min(430px, calc(100% - 28px));
      padding: 14px 17px;

      border: 1px solid rgba(255, 255, 255, 0.96);
      border-radius: 18px;

      color: white;
      text-align: center;
      font-size: 14px;
      font-weight: 800;
      line-height: 1.45;

      background:
        linear-gradient(
          135deg,
          rgba(4, 51, 142, 0.97),
          rgba(0, 132, 255, 0.96)
        );

      box-shadow:
        inset 0 1px 3px rgba(255, 255, 255, 0.65),
        0 15px 38px rgba(0, 61, 154, 0.35);

      opacity: 0;
      pointer-events: none;

      transform: translate(-50%, 18px);

      transition:
        opacity 0.25s ease,
        transform 0.25s ease;
    }

    .toast.show {
      opacity: 1;
      transform: translate(-50%, 0);
    }

    @keyframes earthRingPulse {
      0%,
      100% {
        opacity: 0.58;
        transform: scale(0.98);
      }

      50% {
        opacity: 1;
        transform: scale(1.02);
      }
    }

    @media (max-width: 900px) {
      .top-inner {
        grid-template-columns: 1fr auto;
      }

      .desktop-nav {
        display: none;
      }

      .menu-button {
        display: grid;
      }
    }

    @media (max-width: 560px) {
      .top-header {
        padding: 5px;
      }

      .top-inner {
        min-height: 66px;
        padding: 8px 9px;
        gap: 7px;

        border-radius: 23px;
      }

      .liquid-logo {
        width: 43px;
        height: 43px;
        flex-basis: 43px;
      }

      .liquid-logo::before,
      .liquid-logo::after {
        left: 6px;
        top: 14px;

        width: 31px;
        height: 12px;

        border-width: 3px;
      }

      .brand {
        gap: 8px;
      }

      .brand-name {
        font-size: 19px;
      }

      .brand-owner {
        font-size: 9px;
      }

      .actions {
        gap: 4px;
      }

      .language {
        width: 73px;
        height: 37px;
        padding: 0 4px;

        font-size: 9px;
      }

      .icon-button {
        width: 37px;
        height: 37px;
        flex-basis: 37px;
      }

      .search-panel {
        top: 80px;
        flex-direction: column;
      }

      .search-submit {
        min-height: 43px;
      }

      .mobile-nav {
        grid-template-columns: 1fr;
      }

      .category-button {
        border-radius: 15px;
      }

      .category-button.selected::after {
        right: 4%;
        top: 4%;

        width: 18px;
        height: 18px;

        font-size: 11px;
      }
    }

    @media (max-width: 370px) {
      .brand-owner {
        display: none;
      }

      .brand-name {
        font-size: 17px;
      }

      .language {
        display: none;
      }
    }

    @media (prefers-reduced-motion: reduce) {
      .earth-ring {
        animation: none;
      }
    }
  </style>
</head>

<body>

  <header class="top-header">

    <div class="top-inner">

      <a
        class="brand"
        href="#home"
        aria-label="GlobalLink αρχική σελίδα"
      >

        <span
          class="liquid-logo"
          aria-hidden="true"
        ></span>

        <span>

          <span class="brand-name">
            GlobalLink
          </span>

          <span class="brand-owner">
            by Gavriil Moschidis
          </span>

        </span>
      </a>

      <nav
        class="desktop-nav"
        aria-label="Κύριο μενού"
      >

        <a
          href="#home"
          data-el="ΑΡΧΙΚΗ"
          data-en="HOME"
        >
          ΑΡΧΙΚΗ
        </a>

        <a
          href="#categories"
          data-el="ΚΑΤΗΓΟΡΙΕΣ"
          data-en="CATEGORIES"
        >
          ΚΑΤΗΓΟΡΙΕΣ
        </a>

        <a
          href="#products"
          data-el="ΠΡΟΪΟΝΤΑ"
          data-en="PRODUCTS"
        >
          ΠΡΟΪΟΝΤΑ
        </a>

        <a
          href="#about"
          data-el="ΣΧΕΤΙΚΑ ΜΕ ΕΜΑΣ"
          data-en="ABOUT US"
        >
          ΣΧΕΤΙΚΑ ΜΕ ΕΜΑΣ
        </a>

        <a
          href="#contact"
          data-el="ΕΠΙΚΟΙΝΩΝΙΑ"
          data-en="CONTACT"
        >
          ΕΠΙΚΟΙΝΩΝΙΑ
        </a>

      </nav>

      <div class="actions">

        <select
          class="language"
          id="language"
          aria-label="Επιλογή γλώσσας"
        >

          <option value="el">
            🇬🇷 Ελληνικά
          </option>

          <option value="en">
            🇬🇧 English
          </option>

        </select>

        <button
          class="icon-button"
          id="searchButton"
          type="button"
          aria-label="Αναζήτηση"
        >

          <svg
            viewBox="0 0 24 24"
            aria-hidden="true"
          >

            <circle
              cx="11"
              cy="11"
              r="7"
            ></circle>

            <path d="M20 20l-4-4"></path>

          </svg>
        </button>

        <button
          class="icon-button menu-button"
          id="menuButton"
          type="button"
          aria-label="Άνοιγμα μενού"
        >

          <svg
            viewBox="0 0 24 24"
            aria-hidden="true"
          >

            <path d="M4 7h16"></path>
            <path d="M4 12h16"></path>
            <path d="M4 17h16"></path>

          </svg>
        </button>

      </div>
    </div>

    <nav
      class="mobile-nav"
      id="mobileNav"
      aria-label="Μενού κινητού"
    >

      <a
        href="#home"
        data-el="ΑΡΧΙΚΗ"
        data-en="HOME"
      >
        ΑΡΧΙΚΗ
      </a>

      <a
        href="#categories"
        data-el="ΚΑΤΗΓΟΡΙΕΣ"
        data-en="CATEGORIES"
      >
        ΚΑΤΗΓΟΡΙΕΣ
      </a>

      <a
        href="#products"
        data-el="ΠΡΟΪΟΝΤΑ"
        data-en="PRODUCTS"
      >
        ΠΡΟΪΟΝΤΑ
      </a>

      <a
        href="#about"
        data-el="ΣΧΕΤΙΚΑ ΜΕ ΕΜΑΣ"
        data-en="ABOUT US"
      >
        ΣΧΕΤΙΚΑ ΜΕ ΕΜΑΣ
      </a>

      <a
        href="#contact"
        data-el="ΕΠΙΚΟΙΝΩΝΙΑ"
        data-en="CONTACT"
      >
        ΕΠΙΚΟΙΝΩΝΙΑ
      </a>

    </nav>

  </header>

  <form
    class="search-panel"
    id="searchPanel"
  >

    <input
      id="searchInput"
      type="search"
      placeholder="Γράψε: σπίτι, αυτοκίνητο, τεχνολογία..."
      autocomplete="off"
      aria-label="Λέξη αναζήτησης"
    >

    <button
      class="search-submit"
      id="searchSubmit"
      type="submit"
    >
      ΑΝΑΖΗΤΗΣΗ
    </button>

  </form>

  <main>

    <section
      class="hero-design"
      id="home"
      aria-label="GlobalLink αρχική παρουσίαση"
    >

      <img
        class="hero-image"
        src="assets/homepage.png"
        alt="GlobalLink"
      >

      <span
        class="earth-ring"
        aria-hidden="true"
      ></span>

      <div
        class="earth-wrapper"
        aria-label="Περιστρεφόμενη Γη"
      >

        <video
          class="earth-video"
          autoplay
          muted
          loop
          playsinline
          preload="auto"
          aria-label="Περιστρεφόμενη Γη"
        >

          <source
            src="assets/earth-blue.mp4"
            type="video/mp4"
          >

        </video>

      </div>

    </section>

    <section
      class="lower-design"
      aria-label="Κατηγορίες και προϊόντα GlobalLink"
    >

      <span
        class="section-anchor"
        id="categories"
      ></span>

      <span
        class="section-anchor"
        id="products"
      ></span>

      <span
        class="section-anchor"
        id="about"
      ></span>

      <span
        class="section-anchor"
        id="contact"
      ></span>

      <img
        class="lower-image"
        src="assets/homepage.png"
        alt="Κατηγορίες και προϊόντα GlobalLink"
      >

      <div
        class="category-buttons"
        aria-label="Κατηγορίες προϊόντων"
      >

        <button
          class="category-button"
          type="button"
          data-category="home"
          data-name-el="Σπίτι"
          data-name-en="Home"
          aria-label="Κατηγορία Σπίτι"
        ></button>

        <button
          class="category-button"
          type="button"
          data-category="car"
          data-name-el="Αυτοκίνητο"
          data-name-en="Car"
          aria-label="Κατηγορία Αυτοκίνητο"
        ></button>

        <button
          class="category-button"
          type="button"
          data-category="technology"
          data-name-el="Τεχνολογία"
          data-name-en="Technology"
          aria-label="Κατηγορία Τεχνολογία"
        ></button>

        <button
          class="category-button"
          type="button"
          data-category="tools"
          data-name-el="Εργαλεία"
          data-name-en="Tools"
          aria-label="Κατηγορία Εργαλεία"
        ></button>

        <button
          class="category-button"
          type="button"
          data-category="travel"
          data-name-el="Ταξίδι και κάμπινγκ"
          data-name-en="Travel and camping"
          aria-label="Κατηγορία Ταξίδι και κάμπινγκ"
        ></button>

        <button
          class="category-button"
          type="button"
          data-category="gifts"
          data-name-el="Δώρα"
          data-name-en="Gifts"
          aria-label="Κατηγορία Δώρα"
        ></button>

      </div>

    </section>

  </main>

  <div
    class="toast"
    id="toast"
    role="status"
    aria-live="polite"
  ></div>

  <script>
    const language =
      document.getElementById("language");

    const menuButton =
      document.getElementById("menuButton");

    const mobileNav =
      document.getElementById("mobileNav");

    const searchButton =
      document.getElementById("searchButton");

    const searchPanel =
      document.getElementById("searchPanel");

    const searchInput =
      document.getElementById("searchInput");

    const searchSubmit =
      document.getElementById("searchSubmit");

    const toast =
      document.getElementById("toast");

    const translatedItems =
      document.querySelectorAll(
        "[data-el][data-en]"
      );

    const categoryButtons =
      document.querySelectorAll(
        ".category-button"
      );

    let toastTimer;

    function showToast(message) {
      clearTimeout(toastTimer);

      toast.textContent = message;
      toast.classList.add("show");

      toastTimer = setTimeout(() => {
        toast.classList.remove("show");
      }, 3000);
    }

    function getCategoryName(button) {
      return language.value === "el"
        ? button.dataset.nameEl
        : button.dataset.nameEn;
    }

    function selectCategory(
      categoryId,
      shouldScroll = true
    ) {
      const selectedButton =
        document.querySelector(
          `.category-button[data-category="${categoryId}"]`
        );

      if (!selectedButton) {
        return;
      }

      categoryButtons.forEach((button) => {
        button.classList.remove("selected");

        button.setAttribute(
          "aria-pressed",
          "false"
        );
      });

      selectedButton.classList.add("selected");

      selectedButton.setAttribute(
        "aria-pressed",
        "true"
      );

      try {
        localStorage.setItem(
          "globallink-category",
          categoryId
        );
      } catch (error) {
        console.log(
          "Δεν αποθηκεύτηκε η κατηγορία."
        );
      }

      const categoryName =
        getCategoryName(selectedButton);

      showToast(
        language.value === "el"
          ? `Επιλέχθηκε η κατηγορία: ${categoryName}`
          : `Selected category: ${categoryName}`
      );

      if (shouldScroll) {
        document
          .getElementById("products")
          .scrollIntoView({
            behavior: "smooth",
            block: "start"
          });
      }
    }

    categoryButtons.forEach((button) => {
      button.setAttribute(
        "aria-pressed",
        "false"
      );

      button.addEventListener(
        "click",
        () => {
          selectCategory(
            button.dataset.category,
            true
          );
        }
      );
    });

    try {
      const savedCategory =
        localStorage.getItem(
          "globallink-category"
        );

      if (savedCategory) {
        selectCategory(
          savedCategory,
          false
        );
      }
    } catch (error) {
      console.log(
        "Δεν φορτώθηκε αποθηκευμένη κατηγορία."
      );
    }

    menuButton.addEventListener(
      "click",
      () => {
        mobileNav.classList.toggle("open");
        searchPanel.classList.remove("open");
      }
    );

    mobileNav
      .querySelectorAll("a")
      .forEach((link) => {
        link.addEventListener(
          "click",
          () => {
            mobileNav.classList.remove("open");
          }
        );
      });

    searchButton.addEventListener(
      "click",
      () => {
        searchPanel.classList.toggle("open");
        mobileNav.classList.remove("open");

        if (
          searchPanel.classList.contains("open")
        ) {
          setTimeout(() => {
            searchInput.focus();
          }, 100);
        }
      }
    );

    language.addEventListener(
      "change",
      () => {
        const selectedLanguage =
          language.value;

        translatedItems.forEach((item) => {
          item.textContent =
            selectedLanguage === "el"
              ? item.dataset.el
              : item.dataset.en;
        });

        categoryButtons.forEach((button) => {
          const categoryName =
            getCategoryName(button);

          button.setAttribute(
            "aria-label",
            selectedLanguage === "el"
              ? `Κατηγορία ${categoryName}`
              : `Category ${categoryName}`
          );
        });

        if (selectedLanguage === "el") {
          searchInput.placeholder =
            "Γράψε: σπίτι, αυτοκίνητο, τεχνολογία...";

          searchSubmit.textContent =
            "ΑΝΑΖΗΤΗΣΗ";

          showToast(
            "Η γλώσσα άλλαξε σε Ελληνικά."
          );
        } else {
          searchInput.placeholder =
            "Search: home, car, technology...";

          searchSubmit.textContent =
            "SEARCH";

          showToast(
            "Language changed to English."
          );
        }
      }
    );

    searchPanel.addEventListener(
      "submit",
      (event) => {
        event.preventDefault();

        const term =
          searchInput.value
            .trim()
            .toLocaleLowerCase("el-GR");

        if (!term) {
          showToast(
            language.value === "el"
              ? "Γράψε πρώτα τι θέλεις να αναζητήσεις."
              : "Type what you want to search for."
          );

          return;
        }

        if (
          term.includes("σπίτ") ||
          term.includes("home")
        ) {
          selectCategory("home");
          searchPanel.classList.remove("open");
          return;
        }

        if (
          term.includes("αυτοκ") ||
          term.includes("αμάξ") ||
          term.includes("car")
        ) {
          selectCategory("car");
          searchPanel.classList.remove("open");
          return;
        }

        if (
          term.includes("τεχνο") ||
          term.includes("κινητ") ||
          term.includes("technology") ||
          term.includes("phone")
        ) {
          selectCategory("technology");
          searchPanel.classList.remove("open");
          return;
        }

        if (
          term.includes("εργαλ") ||
          term.includes("δραπα") ||
          term.includes("tool")
        ) {
          selectCategory("tools");
          searchPanel.classList.remove("open");
          return;
        }

        if (
          term.includes("ταξίδ") ||
          term.includes("κάμπ") ||
          term.includes("σκην") ||
          term.includes("travel") ||
          term.includes("camp")
        ) {
          selectCategory("travel");
          searchPanel.classList.remove("open");
          return;
        }

        if (
          term.includes("δώρ") ||
          term.includes("gift")
        ) {
          selectCategory("gifts");
          searchPanel.classList.remove("open");
          return;
        }

        let target = "";

        if (
          term.includes("προϊόν") ||
          term.includes("product")
        ) {
          target = "products";
        }

        if (
          term.includes("σχετικά") ||
          term.includes("ποιοι") ||
          term.includes("about")
        ) {
          target = "about";
        }

        if (
          term.includes("επικοινων") ||
          term.includes("email") ||
          term.includes("contact")
        ) {
          target = "contact";
        }

        if (!target) {
          showToast(
            language.value === "el"
              ? "Δεν βρέθηκε ακόμη αυτή η αναζήτηση."
              : "This search is not available yet."
          );

          return;
        }

        document
          .getElementById(target)
          .scrollIntoView({
            behavior: "smooth",
            block: "start"
          });

        searchPanel.classList.remove("open");

        showToast(
          language.value === "el"
            ? "Μεταφερθήκατε στη σωστή περιοχή."
            : "You moved to the matching section."
        );
      }
    );

    document.addEventListener(
      "click",
      (event) => {
        const clickedSearch =
          searchPanel.contains(event.target) ||
          searchButton.contains(event.target);

        const clickedMenu =
          mobileNav.contains(event.target) ||
          menuButton.contains(event.target);

        if (!clickedSearch) {
          searchPanel.classList.remove("open");
        }

        if (!clickedMenu) {
          mobileNav.classList.remove("open");
        }
      }
    );
  </script>

</body>
</html>
