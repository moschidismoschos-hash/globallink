<!DOCTYPE html>
<html lang="el">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GlobalLink - by Gavriil Moschidis</title>

<style>
:root{
  --blue:#07305f;
  --blue2:#0d63c7;
  --gold:#c99023;
  --text:#071a35;
  --muted:#53657a;
  --white:#ffffff;
  --line:rgba(255,255,255,.75);
}

*{
  box-sizing:border-box;
  margin:0;
  padding:0;
}

html{
  scroll-behavior:smooth;
}

body{
  font-family:Arial, "DejaVu Sans", sans-serif;
  color:var(--text);
  min-height:100vh;
  background:
    linear-gradient(rgba(255,255,255,.72),rgba(238,247,255,.78)),
    url("assets/background.jpg") center/cover fixed no-repeat;
}

.container{
  width:min(1280px,94%);
  margin:auto;
}

.header{
  position:sticky;
  top:0;
  z-index:10;
  padding:14px 0;
  backdrop-filter:blur(14px);
}

.header-box{
  background:rgba(255,255,255,.68);
  border:1px solid rgba(255,255,255,.78);
  border-radius:24px;
  box-shadow:0 18px 38px rgba(7,26,53,.12);
  display:flex;
  align-items:center;
  justify-content:space-between;
  gap:16px;
  padding:14px 18px;
}

.brand{
  display:flex;
  align-items:center;
  gap:12px;
}

.brand-mark{
  width:54px;
  height:54px;
  border-radius:18px;
  background:linear-gradient(135deg,#0b73d9,#ffffff);
  box-shadow:0 12px 24px rgba(13,99,199,.22);
  display:grid;
  place-items:center;
  color:white;
  font-size:28px;
}

.brand strong{
  display:block;
  color:#08224b;
  font-size:30px;
  line-height:.9;
  letter-spacing:-1px;
}

.brand span{
  display:block;
  color:var(--gold);
  font-weight:800;
  margin-top:6px;
  font-size:14px;
}

.lang{
  border:1px solid rgba(8,34,75,.10);
  background:rgba(255,255,255,.7);
  border-radius:18px;
  padding:12px 18px;
  font-size:15px;
  font-weight:900;
  color:#08224b;
}

.hero{
  padding:12px 0 10px;
}

.hero-grid{
  display:grid;
  grid-template-columns:2.1fr 1fr;
  gap:14px;
}

.panel{
  display:block;
  overflow:hidden;
  border-radius:18px;
  border:1px solid rgba(255,255,255,.85);
  box-shadow:0 20px 45px rgba(7,26,53,.13);
  background:rgba(255,255,255,.45);
}

.panel img{
  width:100%;
  height:100%;
  display:block;
  object-fit:cover;
}

.section-title{
  text-align:center;
  margin:22px 0 14px;
}

.section-title h1{
  color:#08224b;
  font-size:34px;
  letter-spacing:-1px;
}

.section-title:after{
  content:"";
  display:block;
  width:70px;
  height:4px;
  background:var(--gold);
  border-radius:99px;
  margin:12px auto 0;
}

.categories{
  display:grid;
  grid-template-columns:repeat(4,1fr);
  gap:14px;
}

.category{
  text-decoration:none;
  display:block;
  overflow:hidden;
  border-radius:18px;
  border:1px solid rgba(255,255,255,.85);
  box-shadow:0 18px 38px rgba(7,26,53,.12);
  transition:.2s ease;
  background:rgba(255,255,255,.52);
}

.category:hover{
  transform:translateY(-4px);
}

.category img{
  width:100%;
  height:100%;
  display:block;
  object-fit:cover;
}

.notice{
  margin:20px 0 28px;
  background:rgba(255,255,255,.72);
  border:1px solid rgba(255,255,255,.82);
  border-radius:22px;
  padding:18px;
  text-align:center;
  color:var(--muted);
  line-height:1.55;
  box-shadow:0 16px 35px rgba(7,26,53,.10);
}

.notice strong{
  color:#08224b;
}

@media(max-width:800px){
  .container{
    width:94%;
  }

  .header-box{
    border-radius:20px;
    padding:11px 12px;
  }

  .brand-mark{
    width:44px;
    height:44px;
    border-radius:15px;
    font-size:23px;
  }

  .brand strong{
    font-size:24px;
  }

  .brand span{
    font-size:12px;
  }

  .lang{
    padding:10px 12px;
    font-size:13px;
  }

  .hero-grid{
    grid-template-columns:1fr;
  }

  .section-title h1{
    font-size:25px;
  }

  .categories{
    grid-template-columns:repeat(2,1fr);
    gap:10px;
  }

  .panel,
  .category{
    border-radius:15px;
  }

  .notice{
    font-size:14px;
    margin-bottom:18px;
  }
}
</style>
</head>

<body>

<header class="header">
  <div class="container">
    <div class="header-box">
      <div class="brand">
        <div class="brand-mark">🌐</div>
        <div>
          <strong>GlobalLink</strong>
          <span>by Gavriil Moschidis</span>
        </div>
      </div>

      <button class="lang">EL / EN</button>
    </div>
  </div>
</header>

<main>

<section class="hero">
  <div class="container">
    <div class="hero-grid">
      <a class="panel" href="#categories">
        <img src="assets/hero.jpg" alt="GlobalLink παγκόσμιες αποστολές">
      </a>

      <a class="panel" href="#categories">
        <img src="assets/side.jpg" alt="GlobalLink πληροφορίες">
      </a>
    </div>
  </div>
</section>

<section class="container" id="categories">
  <div class="section-title">
    <h1>Δημοφιλείς Κατηγορίες</h1>
  </div>

  <div class="categories">
    <a class="category" href="#">
      <img src="assets/tech.jpg" alt="Τεχνολογία">
    </a>

    <a class="category" href="#">
      <img src="assets/home.jpg" alt="Σπίτι">
    </a>

    <a class="category" href="#">
      <img src="assets/clothes.jpg" alt="Ρούχα">
    </a>

    <a class="category" href="#">
      <img src="assets/car.jpg" alt="Αυτοκίνητο">
    </a>
  </div>

  <div class="notice">
    <strong>Η σελίδα περιέχει συνεργαζόμενους συνδέσμους.</strong><br>
    Η αγορά ολοκληρώνεται στην ιστοσελίδα του εκάστοτε συνεργάτη.
  </div>
</section>

</main>

</body>
</html>
