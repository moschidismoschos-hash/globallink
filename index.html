<!DOCTYPE html>
<html lang="el">
<head>
  <meta charset="UTF-8">

  <meta
    name="viewport"
    content="width=device-width, initial-scale=1.0"
  >

  <meta
    name="description"
    content="GlobalLink — προϊόντα από όλο τον κόσμο."
  >

  <title>GlobalLink — by Gavriil Moschidis</title>

  <style>
    :root {
      --σκούρο-μπλε: #052d7c;
      --μπλε: #0878ff;
      --φωτεινό-μπλε: #26c9ff;
      --φόντο: #eef9ff;
      --γυαλί: rgba(255, 255, 255, 0.78);
      --περίγραμμα: rgba(255, 255, 255, 0.98);
      --σκιά: rgba(0, 91, 200, 0.20);
    }

    * {
      box-sizing: border-box;
      scroll-behavior: smooth;
    }

    html,
    body {
      width: 100%;
      min-height: 100%;
      margin: 0;
      padding: 0;
    }

    body {
      overflow-x: hidden;
      color: var(--σκούρο-μπλε);
      font-family: Arial, Helvetica, sans-serif;

      background:
        radial-gradient(
          circle at 10% 0%,
          rgba(59, 194, 255, 0.25),
          transparent 31%
        ),
        radial-gradient(
          circle at 92% 10%,
          rgba(23, 110, 255, 0.18),
          transparent 32%
        ),
        linear-gradient(
          180deg,
          #fbfeff 0%,
          var(--φόντο) 100%
        );
    }

    button,
    select,
    input {
      font: inherit;
    }

    button,
    select,
    a {
      -webkit-tap-highlight-color: transparent;
    }

    .επάνω-μπάρα {
      position: sticky;
      top: 0;
      z-index: 1000;

      width: 100%;
      padding: 7px;

      background: rgba(237, 248, 255, 0.84);

      backdrop-filter: blur(22px);
      -webkit-backdrop-filter: blur(22px);
    }

    .επάνω-εσωτερικό {
      width: min(1180px, 100%);
      min-height: 72px;
      margin: 0 auto;
      padding: 9px 13px;

      display: grid;
      grid-template-columns: auto 1fr auto;
      align-items: center;
      gap: 14px;

      border: 1px solid var(--περίγραμμα);
      border-radius: 27px;

      background:
        linear-gradient(
          135deg,
          rgba(255, 255, 255, 0.92),
          rgba(218, 242, 255, 0.67)
        );

      box-shadow:
        inset 0 2px 5px rgba(255, 255, 255, 1),
        inset 0 -8px 24px rgba(28, 143, 255, 0.08),
        0 12px 34px var(--σκιά);
    }

    .μάρκα {
      min-width: 0;

      display: flex;
      align-items: center;
      gap: 10px;

      color: var(--σκούρο-μπλε);
      text-decoration: none;
    }

    .υγρό-λογότυπο {
      position: relative;

      width: 49px;
      height: 49px;
      flex: 0 0 49px;

      border-radius: 50%;

      background:
        radial-gradient(
          circle at 28% 20%,
          #ffffff 0%,
          #9eeaff 19%,
          #20a8ff 43%,
          #0758dd 70%,
          #032b99 100%
        );

      box-shadow:
        inset 5px 6px 11px rgba(255, 255, 255, 0.92),
        inset -5px -6px 13px rgba(0, 28, 131, 0.48),
        0 8px 22px rgba(0, 103, 255, 0.40);
    }

    .υγρό-λογότυπο::before,
    .υγρό-λογότυπο::after {
      content: "";

      position: absolute;
      left: 7px;
      top: 16px;

      width: 35px;
      height: 14px;

      border: 4px solid rgba(239, 253, 255, 0.90);
      border-radius: 50%;

      box-shadow:
        0 0 9px rgba(0, 198, 255, 0.90),
        inset 0 0 7px rgba(0, 91, 255, 0.75);
    }

    .υγρό-λογότυπο::before {
      transform: rotate(38deg);
    }

    .υγρό-λογότυπο::after {
      transform: rotate(-38deg);
    }

    .όνομα-μάρκας {
      display: block;

      font-size: 25px;
      line-height: 1;
      font-weight: 900;
      letter-spacing: -0.8px;
      white-space: nowrap;
    }

    .όνομα-δημιουργού {
      display: block;

      margin-top: 4px;

      color: #0874e9;
      font-size: 12px;
      font-weight: 700;
      white-space: nowrap;
    }

    .μενού-υπολογιστή {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 3px;
    }

    .μενού-υπολογιστή a {
      padding: 10px 9px;

      border-radius: 14px;

      color: #092e72;
      text-decoration: none;
      font-size: 11px;
      font-weight: 900;
      white-space: nowrap;

      transition:
        transform 0.2s ease,
        background 0.2s ease,
        box-shadow 0.2s ease;
    }

    .μενού-υπολογιστή a:hover,
    .μενού-υπολογιστή a:focus {
      outline: none;

      transform: translateY(-1px);

      background: rgba(255, 255, 255, 0.88);

      box-shadow:
        inset 0 1px 3px white,
        0 7px 18px rgba(0, 97, 220, 0.13);
    }

    .εργαλεία {
      display: flex;
      align-items: center;
      justify-content: flex-end;
      gap: 6px;
    }

    .γλώσσα {
      height: 40px;
      max-width: 112px;
      padding: 0 8px;

      border: 1px solid var(--περίγραμμα);
      border-radius: 15px;
      outline: none;

      color: #073678;
      background: rgba(255, 255, 255, 0.78);

      font-size: 11px;
      font-weight: 800;

      box-shadow:
        inset 0 1px 3px white,
        0 7px 18px rgba(0, 94, 210, 0.12);
    }

    .κουμπί-εικονίδιο {
      width: 40px;
      height: 40px;
      padding: 0;
      flex: 0 0 40px;

      display: grid;
      place-items: center;

      border: 1px solid var(--περίγραμμα);
      border-radius: 50%;

      cursor: pointer;

      color: #063681;
      background: rgba(255, 255, 255, 0.74);

      box-shadow:
        inset 0 1px 3px white,
        0 7px 18px rgba(0, 94, 210, 0.13);

      transition:
        transform 0.2s ease,
        color 0.2s ease,
        background 0.2s ease;
    }

    .κουμπί-εικονίδιο:hover,
    .κουμπί-εικονίδιο:focus {
      outline: none;

      color: #008cff;
      transform: translateY(-1px);

      background: rgba(255, 255, 255, 0.94);
    }

    .κουμπί-εικονίδιο svg {
      width: 20px;
      height: 20px;

      fill: none;
      stroke: currentColor;
      stroke-width: 2;
      stroke-linecap: round;
      stroke-linejoin: round;
    }

    .κουμπί-μενού {
      display: none;
    }

    .μενού-κινητού {
      display: none;

      width: min(1180px, 100%);
      margin: 7px auto 0;
      padding: 10px;

      grid-template-columns: repeat(2, 1fr);
      gap: 7px;

      border: 1px solid var(--περίγραμμα);
      border-radius: 22px;

      background: rgba(242, 251, 255, 0.96);

      backdrop-filter: blur(22px);
      -webkit-backdrop-filter: blur(22px);

      box-shadow:
        inset 0 1px 3px white,
        0 14px 35px rgba(0, 74, 180, 0.21);
    }

    .μενού-κινητού.ανοιχτό {
      display: grid;
    }

    .μενού-κινητού a {
      min-height: 43px;
      padding: 10px;

      display: flex;
      align-items: center;
      justify-content: center;

      border: 1px solid rgba(255, 255, 255, 0.97);
      border-radius: 14px;

      color: #073477;
      text-align: center;
      text-decoration: none;
      font-size: 11px;
      font-weight: 900;

      background: rgba(255, 255, 255, 0.73);

      box-shadow:
        inset 0 1px 3px white,
        0 6px 15px rgba(0, 94, 210, 0.10);
    }

    .αναζήτηση {
      position: fixed;
      z-index: 1300;
      top: 92px;
      left: 50%;

      width: min(560px, calc(100% - 24px));
      padding: 12px;

      display: none;
      gap: 8px;

      border: 1px solid var(--περίγραμμα);
      border-radius: 22px;

      background: rgba(241, 251, 255, 0.96);

      backdrop-filter: blur(24px);
      -webkit-backdrop-filter: blur(24px);

      box-shadow:
        inset 0 1px 3px white,
        0 20px 55px rgba(0, 68, 170, 0.28);

      transform: translateX(-50%);
    }

    .αναζήτηση.ανοιχτή {
      display: flex;
    }

    .αναζήτηση input {
      width: 100%;
      min-width: 0;
      padding: 13px 14px;

      border: 1px solid rgba(0, 116, 255, 0.19);
      border-radius: 15px;
      outline: none;

      color: var(--σκούρο-μπλε);
      background: rgba(255, 255, 255, 0.92);
    }

    .αναζήτηση input:focus {
      border-color: rgba(0, 121, 255, 0.55);

      box-shadow:
        0 0 0 4px rgba(0, 121, 255, 0.10);
    }

    .κουμπί-αναζήτησης {
      padding: 0 17px;

      border: 0;
      border-radius: 15px;

      cursor: pointer;

      color: white;
      font-size: 12px;
      font-weight: 900;

      background:
        linear-gradient(
          135deg,
          var(--μπλε),
          var(--φωτεινό-μπλε)
        );

      box-shadow:
        0 8px 21px rgba(0, 108, 255, 0.31);
    }

    /*
      Το επάνω σχέδιο κρατά ακριβώς το
      αρχικό οριζόντιο μέγεθος.
    */

    .κεντρικό-σχέδιο {
      position: relative;

      width: min(1100px, 100%);
      aspect-ratio: 1024 / 474;
      margin: 0 auto;

      overflow: hidden;
    }

    .κεντρική-εικόνα {
      position: absolute;
      z-index: 1;
      left: 0;
      top: 0;

      width: 100%;
      height: auto;
      display: block;

      transform: translateY(-6.515%);
    }

    /*
      Η σφαίρα μπαίνει ακριβώς στη θέση
      της αρχικής Γης.
    */

    .περίβλημα-γης {
      position: absolute;
      z-index: 5;

      left: 54.6%;
      top: 4%;
      width: 36.8%;
      aspect-ratio: 1;

      overflow: hidden;

      border: 2px solid rgba(225, 251, 255, 0.92);
      border-radius: 50%;

      background:
        radial-gradient(
          circle at 34% 25%,
          #f7ffff 0%,
          #9deaff 20%,
          #209dff 47%,
          #0753ce 73%,
          #031e78 100%
        );

      box-shadow:
        inset 7px 8px 17px rgba(255, 255, 255, 0.65),
        inset -12px -13px 24px rgba(0, 22, 101, 0.38),
        0 0 13px rgba(255, 255, 255, 0.95),
        0 0 30px rgba(32, 184, 255, 0.80),
        0 18px 35px rgba(0, 75, 190, 0.34);

      pointer-events: none;
    }

    .περίβλημα-γης::before {
      content: "";

      position: absolute;
      z-index: 7;
      inset: 0;

      border-radius: 50%;

      background:
        radial-gradient(
          circle at 28% 20%,
          rgba(255, 255, 255, 0.50),
          transparent 36%
        ),
        radial-gradient(
          circle at 70% 74%,
          transparent 44%,
          rgba(0, 17, 76, 0.32) 100%
        );

      pointer-events: none;
    }

    .περίβλημα-γης::after {
      content: "";

      position: absolute;
      z-index: 8;

      left: 13%;
      top: 7%;

      width: 27%;
      height: 52%;

      border-radius: 50%;

      background:
        linear-gradient(
          110deg,
          rgba(255, 255, 255, 0.44),
          rgba(255, 255, 255, 0.03)
        );

      filter: blur(2px);

      transform: rotate(26deg);

      pointer-events: none;
    }

    .βίντεο-γης {
      position: absolute;
      z-index: 6;

      left: 50%;
      top: 50%;

      width: 122%;
      height: 122%;

      object-fit: cover;
      object-position: center;

      transform:
        translate(-50%, -50%)
        scale(1.18);

      filter:
        brightness(1.24)
        saturate(1.26)
        contrast(1.05);

      mix-blend-mode: screen;

      pointer-events: none;
    }

    .δαχτυλίδι-γης {
      position: absolute;
      z-index: 4;

      left: 52%;
      top: 1%;
      width: 42%;
      aspect-ratio: 1;

      border: 2px solid rgba(137, 229, 255, 0.40);
      border-radius: 50%;

      box-shadow:
        0 0 16px rgba(49, 195, 255, 0.74),
        inset 0 0 15px rgba(255, 255, 255, 0.40);

      pointer-events: none;

      animation:
        ανάσα-δαχτυλιδιού
        3.5s
        ease-in-out
        infinite;
    }

    @keyframes ανάσα-δαχτυλιδιού {
      0%,
      100% {
        opacity: 0.58;
        transform: scale(0.98);
      }

      50% {
        opacity: 1;
        transform: scale(1.02);
      }
    }

    /*
      Το κάτω μέρος παραμένει ακριβώς όπως
      ήταν στην αρχική εικόνα.
    */

    .κάτω-σχέδιο {
      position: relative;

      width: min(1100px, 100%);
      aspect-ratio: 1024 / 960;
      margin: 0 auto;

      overflow: hidden;
    }

    .κάτω-εικόνα {
      position: absolute;
      left: 0;
      top: 0;

      width: 100%;
      height: auto;
      display: block;

      transform: translateY(-37.46%);
    }

    .σημείο {
      position: absolute;
      left: 0;

      width: 1px;
      height: 1px;

      scroll-margin-top: 92px;
    }

    #αρχική {
      top: 0;
    }

    #κατηγορίες {
      top: 0;
    }

    #προϊόντα {
      top: 24%;
    }

    #σχετικά {
      top: 72%;
    }

    #επικοινωνία {
      top: 88%;
    }

    .ειδοποίηση {
      position: fixed;
      z-index: 1600;
      left: 50%;
      bottom: 24px;

      width: min(430px, calc(100% - 28px));
      padding: 14px 17px;

      border: 1px solid rgba(255, 255, 255, 0.96);
      border-radius: 18px;

      color: white;
      text-align: center;
      font-size: 14px;
      font-weight: 800;
      line-height: 1.45;

      background:
        linear-gradient(
          135deg,
          rgba(4, 51, 142, 0.97),
          rgba(0, 132, 255, 0.96)
        );

      box-shadow:
        inset 0 1px 3px rgba(255, 255, 255, 0.65),
        0 15px 38px rgba(0, 61, 154, 0.35);

      opacity: 0;
      pointer-events: none;

      transform: translate(-50%, 18px);

      transition:
        opacity 0.25s ease,
        transform 0.25s ease;
    }

    .ειδοποίηση.φαίνεται {
      opacity: 1;

      transform: translate(-50%, 0);
    }

    @media (max-width: 900px) {
      .επάνω-εσωτερικό {
        grid-template-columns: 1fr auto;
      }

      .μενού-υπολογιστή {
        display: none;
      }

      .κουμπί-μενού {
        display: grid;
      }
    }

    @media (max-width: 560px) {
      .επάνω-μπάρα {
        padding: 5px;
      }

      .επάνω-εσωτερικό {
        min-height: 66px;
        padding: 8px 9px;
        gap: 7px;

        border-radius: 23px;
      }

      .υγρό-λογότυπο {
        width: 43px;
        height: 43px;
        flex-basis: 43px;
      }

      .υγρό-λογότυπο::before,
      .υγρό-λογότυπο::after {
        left: 6px;
        top: 14px;

        width: 31px;
        height: 12px;

        border-width: 3px;
      }

      .μάρκα {
        gap: 8px;
      }

      .όνομα-μάρκας {
        font-size: 19px;
      }

      .όνομα-δημιουργού {
        font-size: 9px;
      }

      .εργαλεία {
        gap: 4px;
      }

      .γλώσσα {
        width: 73px;
        height: 37px;
        padding: 0 4px;

        font-size: 9px;
      }

      .κουμπί-εικονίδιο {
        width: 37px;
        height: 37px;
        flex-basis: 37px;
      }

      .αναζήτηση {
        top: 80px;

        flex-direction: column;
      }

      .κουμπί-αναζήτησης {
        min-height: 43px;
      }

      .μενού-κινητού {
        grid-template-columns: 1fr;
      }
    }

    @media (max-width: 370px) {
      .όνομα-δημιουργού {
        display: none;
      }

      .όνομα-μάρκας {
        font-size: 17px;
      }

      .γλώσσα {
        display: none;
      }
    }

    @media (prefers-reduced-motion: reduce) {
      .δαχτυλίδι-γης {
        animation: none;
      }
    }
  </style>
</head>

<body>

  <header class="επάνω-μπάρα">

    <div class="επάνω-εσωτερικό">

      <a
        class="μάρκα"
        href="#αρχική"
        aria-label="GlobalLink αρχική σελίδα"
      >

        <span
          class="υγρό-λογότυπο"
          aria-hidden="true"
        ></span>

        <span>

          <span class="όνομα-μάρκας">
            GlobalLink
          </span>

          <span class="όνομα-δημιουργού">
            by Gavriil Moschidis
          </span>

        </span>
      </a>

      <nav
        class="μενού-υπολογιστή"
        aria-label="Κύριο μενού"
      >

        <a
          href="#αρχική"
          data-el="ΑΡΧΙΚΗ"
          data-en="HOME"
        >
          ΑΡΧΙΚΗ
        </a>

        <a
          href="#κατηγορίες"
          data-el="ΚΑΤΗΓΟΡΙΕΣ"
          data-en="CATEGORIES"
        >
          ΚΑΤΗΓΟΡΙΕΣ
        </a>

        <a
          href="#προϊόντα"
          data-el="ΠΡΟΪΟΝΤΑ"
          data-en="PRODUCTS"
        >
          ΠΡΟΪΟΝΤΑ
        </a>

        <a
          href="#σχετικά"
          data-el="ΣΧΕΤΙΚΑ ΜΕ ΕΜΑΣ"
          data-en="ABOUT US"
        >
          ΣΧΕΤΙΚΑ ΜΕ ΕΜΑΣ
        </a>

        <a
          href="#επικοινωνία"
          data-el="ΕΠΙΚΟΙΝΩΝΙΑ"
          data-en="CONTACT"
        >
          ΕΠΙΚΟΙΝΩΝΙΑ
        </a>

      </nav>

      <div class="εργαλεία">

        <select
          class="γλώσσα"
          id="γλώσσα"
          aria-label="Επιλογή γλώσσας"
        >

          <option value="el">
            🇬🇷 Ελληνικά
          </option>

          <option value="en">
            🇬🇧 English
          </option>

        </select>

        <button
          class="κουμπί-εικονίδιο"
          id="κουμπίΑναζήτησης"
          type="button"
          aria-label="Αναζήτηση"
        >

          <svg
            viewBox="0 0 24 24"
            aria-hidden="true"
          >

            <circle
              cx="11"
              cy="11"
              r="7"
            ></circle>

            <path d="M20 20l-4-4"></path>

          </svg>
        </button>

        <button
          class="κουμπί-εικονίδιο κουμπί-μενού"
          id="κουμπίΜενού"
          type="button"
          aria-label="Άνοιγμα μενού"
        >

          <svg
            viewBox="0 0 24 24"
            aria-hidden="true"
          >

            <path d="M4 7h16"></path>
            <path d="M4 12h16"></path>
            <path d="M4 17h16"></path>

          </svg>
        </button>

      </div>
    </div>

    <nav
      class="μενού-κινητού"
      id="μενούΚινητού"
      aria-label="Μενού κινητού"
    >

      <a
        href="#αρχική"
        data-el="ΑΡΧΙΚΗ"
        data-en="HOME"
      >
        ΑΡΧΙΚΗ
      </a>

      <a
        href="#κατηγορίες"
        data-el="ΚΑΤΗΓΟΡΙΕΣ"
        data-en="CATEGORIES"
      >
        ΚΑΤΗΓΟΡΙΕΣ
      </a>

      <a
        href="#προϊόντα"
        data-el="ΠΡΟΪΟΝΤΑ"
        data-en="PRODUCTS"
      >
        ΠΡΟΪΟΝΤΑ
      </a>

      <a
        href="#σχετικά"
        data-el="ΣΧΕΤΙΚΑ ΜΕ ΕΜΑΣ"
        data-en="ABOUT US"
      >
        ΣΧΕΤΙΚΑ ΜΕ ΕΜΑΣ
      </a>

      <a
        href="#επικοινωνία"
        data-el="ΕΠΙΚΟΙΝΩΝΙΑ"
        data-en="CONTACT"
      >
        ΕΠΙΚΟΙΝΩΝΙΑ
      </a>

    </nav>

  </header>

  <form
    class="αναζήτηση"
    id="φόρμαΑναζήτησης"
  >

    <input
      id="πεδίοΑναζήτησης"
      type="search"
      placeholder="Γράψε: σπίτι, αυτοκίνητο, τεχνολογία..."
      autocomplete="off"
      aria-label="Λέξη αναζήτησης"
    >

    <button
      class="κουμπί-αναζήτησης"
      id="εκτέλεσηΑναζήτησης"
      type="submit"
    >
      ΑΝΑΖΗΤΗΣΗ
    </button>

  </form>

  <main>

    <section
      class="κεντρικό-σχέδιο"
      id="αρχική"
      aria-label="GlobalLink αρχική παρουσίαση"
    >

      <img
        class="κεντρική-εικόνα"
        src="assets/homepage.png"
        alt="GlobalLink"
      >

      <span
        class="δαχτυλίδι-γης"
        aria-hidden="true"
      ></span>

      <div
        class="περίβλημα-γης"
        aria-label="Περιστρεφόμενη Γη"
      >

        <video
          class="βίντεο-γης"
          autoplay
          muted
          loop
          playsinline
          preload="auto"
          aria-label="Περιστρεφόμενη Γη"
        >

          <source
            src="assets/earth-blue.mp4"
            type="video/mp4"
          >

        </video>

      </div>

    </section>

    <section
      class="κάτω-σχέδιο"
      aria-label="Κατηγορίες και προϊόντα GlobalLink"
    >

      <span
        class="σημείο"
        id="κατηγορίες"
      ></span>

      <span
        class="σημείο"
        id="προϊόντα"
      ></span>

      <span
        class="σημείο"
        id="σχετικά"
      ></span>

      <span
        class="σημείο"
        id="επικοινωνία"
      ></span>

      <img
        class="κάτω-εικόνα"
        src="assets/homepage.png"
        alt="Κατηγορίες και προϊόντα GlobalLink"
      >

    </section>

  </main>

  <div
    class="ειδοποίηση"
    id="ειδοποίηση"
    role="status"
    aria-live="polite"
  ></div>

  <!--
    Περιστρεφόμενη Blue Marble:
    NASA/Goddard Space Flight Center
    Scientific Visualization Studio.
  -->

  <script>
    const γλώσσα =
      document.getElementById("γλώσσα");

    const κουμπίΜενού =
      document.getElementById("κουμπίΜενού");

    const μενούΚινητού =
      document.getElementById("μενούΚινητού");

    const κουμπίΑναζήτησης =
      document.getElementById("κουμπίΑναζήτησης");

    const φόρμαΑναζήτησης =
      document.getElementById("φόρμαΑναζήτησης");

    const πεδίοΑναζήτησης =
      document.getElementById("πεδίοΑναζήτησης");

    const εκτέλεσηΑναζήτησης =
      document.getElementById("εκτέλεσηΑναζήτησης");

    const ειδοποίηση =
      document.getElementById("ειδοποίηση");

    const μεταφραζόμεναΣτοιχεία =
      document.querySelectorAll(
        "[data-el][data-en]"
      );

    let χρόνοςΕιδοποίησης;

    function εμφάνισεΕιδοποίηση(μήνυμα) {
      clearTimeout(χρόνοςΕιδοποίησης);

      ειδοποίηση.textContent = μήνυμα;
      ειδοποίηση.classList.add("φαίνεται");

      χρόνοςΕιδοποίησης = setTimeout(() => {
        ειδοποίηση.classList.remove("φαίνεται");
      }, 2800);
    }

    κουμπίΜενού.addEventListener(
      "click",
      () => {
        μενούΚινητού.classList.toggle("ανοιχτό");
        φόρμαΑναζήτησης.classList.remove("ανοιχτή");
      }
    );

    μενούΚινητού
      .querySelectorAll("a")
      .forEach((σύνδεσμος) => {
        σύνδεσμος.addEventListener(
          "click",
          () => {
            μενούΚινητού.classList.remove("ανοιχτό");
          }
        );
      });

    κουμπίΑναζήτησης.addEventListener(
      "click",
      () => {
        φόρμαΑναζήτησης.classList.toggle("ανοιχτή");
        μενούΚινητού.classList.remove("ανοιχτό");

        if (
          φόρμαΑναζήτησης.classList.contains("ανοιχτή")
        ) {
          setTimeout(() => {
            πεδίοΑναζήτησης.focus();
          }, 100);
        }
      }
    );

    γλώσσα.addEventListener(
      "change",
      () => {
        const επιλεγμένηΓλώσσα =
          γλώσσα.value;

        μεταφραζόμεναΣτοιχεία.forEach(
          (στοιχείο) => {
            στοιχείο.textContent =
              επιλεγμένηΓλώσσα === "el"
                ? στοιχείο.dataset.el
                : στοιχείο.dataset.en;
          }
        );

        if (επιλεγμένηΓλώσσα === "el") {
          πεδίοΑναζήτησης.placeholder =
            "Γράψε: σπίτι, αυτοκίνητο, τεχνολογία...";

          εκτέλεσηΑναζήτησης.textContent =
            "ΑΝΑΖΗΤΗΣΗ";

          εμφάνισεΕιδοποίηση(
            "Η γλώσσα άλλαξε σε Ελληνικά."
          );
        } else {
          πεδίοΑναζήτησης.placeholder =
            "Search: home, car, technology...";

          εκτέλεσηΑναζήτησης.textContent =
            "SEARCH";

          εμφάνισεΕιδοποίηση(
            "Language changed to English."
          );
        }
      }
    );

    φόρμαΑναζήτησης.addEventListener(
      "submit",
      (γεγονός) => {
        γεγονός.preventDefault();

        const λέξη =
          πεδίοΑναζήτησης.value
            .trim()
            .toLocaleLowerCase("el-GR");

        if (!λέξη) {
          εμφάνισεΕιδοποίηση(
            γλώσσα.value === "el"
              ? "Γράψε πρώτα τι θέλεις να αναζητήσεις."
              : "Type what you want to search for."
          );

          return;
        }

        let στόχος = "";

        if (
          λέξη.includes("σπίτ") ||
          λέξη.includes("αυτοκ") ||
          λέξη.includes("τεχνο") ||
          λέξη.includes("εργαλ") ||
          λέξη.includes("ταξίδ") ||
          λέξη.includes("κάμπ") ||
          λέξη.includes("δώρ") ||
          λέξη.includes("home") ||
          λέξη.includes("car") ||
          λέξη.includes("technology") ||
          λέξη.includes("tool") ||
          λέξη.includes("travel") ||
          λέξη.includes("gift")
        ) {
          στόχος = "κατηγορίες";
        }

        if (
          λέξη.includes("προϊόν") ||
          λέξη.includes("φορτιστ") ||
          λέξη.includes("φριτέζ") ||
          λέξη.includes("ρολό") ||
          λέξη.includes("σκην") ||
          λέξη.includes("product") ||
          λέξη.includes("charger") ||
          λέξη.includes("watch")
        ) {
          στόχος = "προϊόντα";
        }

        if (
          λέξη.includes("σχετικά") ||
          λέξη.includes("ποιοι") ||
          λέξη.includes("about")
        ) {
          στόχος = "σχετικά";
        }

        if (
          λέξη.includes("επικοινων") ||
          λέξη.includes("email") ||
          λέξη.includes("contact")
        ) {
          στόχος = "επικοινωνία";
        }

        if (!στόχος) {
          εμφάνισεΕιδοποίηση(
            γλώσσα.value === "el"
              ? "Δεν βρέθηκε ακόμη αυτή η αναζήτηση."
              : "This search is not available yet."
          );

          return;
        }

        document
          .getElementById(στόχος)
          .scrollIntoView({
            behavior: "smooth",
            block: "start"
          });

        φόρμαΑναζήτησης.classList.remove("ανοιχτή");

        εμφάνισεΕιδοποίηση(
          γλώσσα.value === "el"
            ? "Μεταφερθήκατε στη σωστή περιοχή."
            : "You moved to the matching section."
        );
      }
    );

    document.addEventListener(
      "click",
      (γεγονός) => {
        const πάτησεΑναζήτηση =
          φόρμαΑναζήτησης.contains(γεγονός.target) ||
          κουμπίΑναζήτησης.contains(γεγονός.target);

        const πάτησεΜενού =
          μενούΚινητού.contains(γεγονός.target) ||
          κουμπίΜενού.contains(γεγονός.target);

        if (!πάτησεΑναζήτηση) {
          φόρμαΑναζήτησης.classList.remove("ανοιχτή");
        }

        if (!πάτησεΜενού) {
          μενούΚινητού.classList.remove("ανοιχτό");
        }
      }
    );
  </script>

</body>
</html>
