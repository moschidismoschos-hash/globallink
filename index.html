<!DOCTYPE html>
<html lang="el">
<head>
  <meta charset="UTF-8">

  <meta
    name="viewport"
    content="width=device-width, initial-scale=1.0"
  >

  <meta
    name="description"
    content="GlobalLink — επιλεγμένα προϊόντα από όλο τον κόσμο."
  >

  <title>GlobalLink — by Gavriil Moschidis</title>

  <style>
    :root {
      --σκούρο-μπλε: #052d7c;
      --μπλε: #0878ff;
      --φωτεινό-μπλε: #26c9ff;
      --φόντο: #eef9ff;
      --περίγραμμα: rgba(255, 255, 255, 0.98);
      --σκιά: rgba(0, 91, 200, 0.20);
    }

    * {
      box-sizing: border-box;
      scroll-behavior: smooth;
    }

    html,
    body {
      width: 100%;
      min-height: 100%;
      margin: 0;
      padding: 0;
    }

    body {
      overflow-x: hidden;
      color: var(--σκούρο-μπλε);
      font-family: Arial, Helvetica, sans-serif;

      background:
        radial-gradient(
          circle at 10% 0%,
          rgba(59, 194, 255, 0.25),
          transparent 31%
        ),
        radial-gradient(
          circle at 92% 10%,
          rgba(23, 110, 255, 0.18),
          transparent 32%
        ),
        linear-gradient(
          180deg,
          #fbfeff 0%,
          var(--φόντο) 100%
        );
    }

    button,
    select,
    input {
      font: inherit;
    }

    button,
    select,
    a {
      -webkit-tap-highlight-color: transparent;
    }

    .επάνω-μπάρα {
      position: sticky;
      top: 0;
      z-index: 1000;

      width: 100%;
      padding: 7px;

      background: rgba(237, 248, 255, 0.84);

      backdrop-filter: blur(22px);
      -webkit-backdrop-filter: blur(22px);
    }

    .επάνω-εσωτερικό {
      width: min(1180px, 100%);
      min-height: 72px;
      margin: 0 auto;
      padding: 9px 13px;

      display: grid;
      grid-template-columns: auto 1fr auto;
      align-items: center;
      gap: 14px;

      border: 1px solid var(--περίγραμμα);
      border-radius: 27px;

      background:
        linear-gradient(
          135deg,
          rgba(255, 255, 255, 0.92),
          rgba(218, 242, 255, 0.67)
        );

      box-shadow:
        inset 0 2px 5px rgba(255, 255, 255, 1),
        inset 0 -8px 24px rgba(28, 143, 255, 0.08),
        0 12px 34px var(--σκιά);
    }

    .μάρκα {
      min-width: 0;

      display: flex;
      align-items: center;
      gap: 10px;

      color: var(--σκούρο-μπλε);
      text-decoration: none;
    }

    .υγρό-λογότυπο {
      position: relative;

      width: 49px;
      height: 49px;
      flex: 0 0 49px;

      border-radius: 50%;

      background:
        radial-gradient(
          circle at 28% 20%,
          #ffffff 0%,
          #9eeaff 19%,
          #20a8ff 43%,
          #0758dd 70%,
          #032b99 100%
        );

      box-shadow:
        inset 5px 6px 11px rgba(255, 255, 255, 0.92),
        inset -5px -6px 13px rgba(0, 28, 131, 0.48),
        0 8px 22px rgba(0, 103, 255, 0.40);
    }

    .υγρό-λογότυπο::before,
    .υγρό-λογότυπο::after {
      content: "";

      position: absolute;
      left: 7px;
      top: 16px;

      width: 35px;
      height: 14px;

      border: 4px solid rgba(239, 253, 255, 0.90);
      border-radius: 50%;

      box-shadow:
        0 0 9px rgba(0, 198, 255, 0.90),
        inset 0 0 7px rgba(0, 91, 255, 0.75);
    }

    .υγρό-λογότυπο::before {
      transform: rotate(38deg);
    }

    .υγρό-λογότυπο::after {
      transform: rotate(-38deg);
    }

    .όνομα-μάρκας {
      display: block;

      font-size: 25px;
      line-height: 1;
      font-weight: 900;
      letter-spacing: -0.8px;
      white-space: nowrap;
    }

    .όνομα-δημιουργού {
      display: block;

      margin-top: 4px;

      color: #0874e9;
      font-size: 12px;
      font-weight: 700;
      white-space: nowrap;
    }

    .μενού-υπολογιστή {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 3px;
    }

    .μενού-υπολογιστή a {
      padding: 10px 9px;

      border-radius: 14px;

      color: #092e72;
      text-decoration: none;
      font-size: 11px;
      font-weight: 900;
      white-space: nowrap;

      transition:
        transform 0.2s ease,
        background 0.2s ease,
        box-shadow 0.2s ease;
    }

    .μενού-υπολογιστή a:hover,
    .μενού-υπολογιστή a:focus {
      outline: none;
      transform: translateY(-1px);

      background: rgba(255, 255, 255, 0.88);

      box-shadow:
        inset 0 1px 3px white,
        0 7px 18px rgba(0, 97, 220, 0.13);
    }

    .εργαλεία {
      display: flex;
      align-items: center;
      justify-content: flex-end;
      gap: 6px;
    }

    .γλώσσα {
      height: 40px;
      max-width: 112px;
      padding: 0 8px;

      border: 1px solid var(--περίγραμμα);
      border-radius: 15px;
      outline: none;

      color: #073678;
      background: rgba(255, 255, 255, 0.78);

      font-size: 11px;
      font-weight: 800;

      box-shadow:
        inset 0 1px 3px white,
        0 7px 18px rgba(0, 94, 210, 0.12);
    }

    .κουμπί-εικονίδιο {
      width: 40px;
      height: 40px;
      padding: 0;
      flex: 0 0 40px;

      display: grid;
      place-items: center;

      border: 1px solid var(--περίγραμμα);
      border-radius: 50%;
      cursor: pointer;

      color: #063681;
      background: rgba(255, 255, 255, 0.74);

      box-shadow:
        inset 0 1px 3px white,
        0 7px 18px rgba(0, 94, 210, 0.13);
    }

    .κουμπί-εικονίδιο:hover,
    .κουμπί-εικονίδιο:focus {
      outline: none;
      color: #008cff;
      transform: translateY(-1px);
    }

    .κουμπί-εικονίδιο svg {
      width: 20px;
      height: 20px;

      fill: none;
      stroke: currentColor;
      stroke-width: 2;
      stroke-linecap: round;
      stroke-linejoin: round;
    }

    .κουμπί-μενού {
      display: none;
    }

    .μενού-κινητού {
      display: none;

      width: min(1180px, 100%);
      margin: 7px auto 0;
      padding: 10px;

      grid-template-columns: repeat(2, 1fr);
      gap: 7px;

      border: 1px solid var(--περίγραμμα);
      border-radius: 22px;

      background: rgba(242, 251, 255, 0.96);

      backdrop-filter: blur(22px);
      -webkit-backdrop-filter: blur(22px);

      box-shadow:
        inset 0 1px 3px white,
        0 14px 35px rgba(0, 74, 180, 0.21);
    }

    .μενού-κινητού.ανοιχτό {
      display: grid;
    }

    .μενού-κινητού a {
      min-height: 43px;
      padding: 10px;

      display: flex;
      align-items: center;
      justify-content: center;

      border: 1px solid rgba(255, 255, 255, 0.97);
      border-radius: 14px;

      color: #073477;
      text-align: center;
      text-decoration: none;
      font-size: 11px;
      font-weight: 900;

      background: rgba(255, 255, 255, 0.73);
    }

    .αναζήτηση {
      position: fixed;
      z-index: 1300;
      top: 92px;
      left: 50%;

      width: min(560px, calc(100% - 24px));
      padding: 12px;

      display: none;
      gap: 8px;

      border: 1px solid var(--περίγραμμα);
      border-radius: 22px;

      background: rgba(241, 251, 255, 0.96);

      backdrop-filter: blur(24px);
      -webkit-backdrop-filter: blur(24px);

      box-shadow:
        inset 0 1px 3px white,
        0 20px 55px rgba(0, 68, 170, 0.28);

      transform: translateX(-50%);
    }

    .αναζήτηση.ανοιχτή {
      display: flex;
    }

    .αναζήτηση input {
      width: 100%;
      min-width: 0;
      padding: 13px 14px;

      border: 1px solid rgba(0, 116, 255, 0.19);
      border-radius: 15px;
      outline: none;

      color: var(--σκούρο-μπλε);
      background: rgba(255, 255, 255, 0.92);
    }

    .κουμπί-αναζήτησης {
      padding: 0 17px;

      border: 0;
      border-radius: 15px;
      cursor: pointer;

      color: white;
      font-size: 12px;
      font-weight: 900;

      background:
        linear-gradient(
          135deg,
          var(--μπλε),
          var(--φωτεινό-μπλε)
        );
    }

    .κεντρικό-σχέδιο {
      position: relative;

      width: min(1100px, 100%);
      aspect-ratio: 1024 / 474;
      margin: 0 auto;

      overflow: hidden;
    }

    .κεντρική-εικόνα {
      position: absolute;
      z-index: 1;
      left: 0;
      top: 0;

      width: 100%;
      height: auto;
      display: block;

      transform: translateY(-6.515%);
    }

    .δαχτυλίδι-γης {
      position: absolute;
      z-index: 4;

      left: 52%;
      top: 1%;
      width: 42%;
      aspect-ratio: 1;

      border: 2px solid rgba(137, 229, 255, 0.44);
      border-radius: 50%;

      box-shadow:
        0 0 16px rgba(49, 195, 255, 0.78),
        inset 0 0 15px rgba(255, 255, 255, 0.45);

      pointer-events: none;

      animation:
        ανάσα-δαχτυλιδιού
        3.5s
        ease-in-out
        infinite;
    }

    .γυάλινη-γη {
      position: absolute;
      z-index: 5;

      left: 54.6%;
      top: 4%;

      width: 36.8%;
      aspect-ratio: 1;

      overflow: hidden;

      border: 2px solid rgba(231, 252, 255, 0.96);
      border-radius: 50%;

      background:
        radial-gradient(
          circle at 32% 25%,
          #bff5ff 0%,
          #269cff 44%,
          #0646be 75%,
          #02195f 100%
        );

      box-shadow:
        inset 7px 8px 17px rgba(255, 255, 255, 0.52),
        inset -12px -13px 25px rgba(0, 19, 91, 0.42),
        0 0 13px rgba(255, 255, 255, 0.96),
        0 0 30px rgba(32, 184, 255, 0.82),
        0 18px 35px rgba(0, 75, 190, 0.36);

      pointer-events: none;
    }

    .γυάλινη-γη::before {
      content: "";

      position: absolute;
      z-index: 8;
      inset: 0;

      border-radius: 50%;

      background:
        radial-gradient(
          circle at 26% 18%,
          rgba(255, 255, 255, 0.52),
          transparent 35%
        ),
        radial-gradient(
          circle at 72% 76%,
          transparent 40%,
          rgba(0, 15, 73, 0.42) 100%
        );

      pointer-events: none;
    }

    .γυάλινη-γη::after {
      content: "";

      position: absolute;
      z-index: 9;

      left: 13%;
      top: 6%;

      width: 25%;
      height: 54%;

      border-radius: 50%;

      background:
        linear-gradient(
          110deg,
          rgba(255, 255, 255, 0.48),
          rgba(255, 255, 255, 0.02)
        );

      filter: blur(2px);
      transform: rotate(25deg);

      pointer-events: none;
    }

    #καμβάςΓης {
      position: absolute;
      z-index: 6;
      inset: 0;

      width: 100%;
      height: 100%;
      display: block;

      border-radius: 50%;
    }

    .γραμμές-γης {
      position: absolute;
      z-index: 7;
      inset: 0;

      border-radius: 50%;

      background:
        linear-gradient(
          90deg,
          transparent 49.5%,
          rgba(195, 245, 255, 0.22) 50%,
          transparent 50.5%
        );

      opacity: 0.5;
      pointer-events: none;
    }

    .γραμμές-γης::before,
    .γραμμές-γης::after {
      content: "";

      position: absolute;
      left: 8%;
      right: 8%;

      border: 1px solid rgba(197, 246, 255, 0.32);
      border-radius: 50%;
    }

    .γραμμές-γης::before {
      top: 29%;
      bottom: 29%;
    }

    .γραμμές-γης::after {
      top: 12%;
      bottom: 12%;

      transform: scaleX(0.55);
    }

    .κάτω-σχέδιο {
      position: relative;

      width: min(1100px, 100%);
      aspect-ratio: 1024 / 960;
      margin: 0 auto;

      overflow: hidden;
    }

    .κάτω-εικόνα {
      position: absolute;
      z-index: 1;
      left: 0;
      top: 0;

      width: 100%;
      height: auto;
      display: block;

      transform: translateY(-37.46%);
    }

    .κουμπιά-κατηγοριών {
      position: absolute;
      z-index: 10;

      left: 1.55%;
      right: 1.55%;
      top: 0.3%;
      height: 18.2%;

      display: grid;
      grid-template-columns: repeat(6, 1fr);
      gap: 1.25%;
    }

    .κουμπί-κατηγορίας {
      position: relative;

      width: 100%;
      height: 100%;
      padding: 0;

      border: 2px solid transparent;
      border-radius: 22px;

      cursor: pointer;

      color: transparent;
      background: transparent;

      transition:
        border-color 0.22s ease,
        box-shadow 0.22s ease,
        transform 0.22s ease,
        background 0.22s ease;
    }

    .κουμπί-κατηγορίας:hover,
    .κουμπί-κατηγορίας:focus-visible {
      outline: none;

      border-color: rgba(62, 193, 255, 0.75);

      box-shadow:
        inset 0 0 18px rgba(255, 255, 255, 0.55),
        0 0 20px rgba(0, 145, 255, 0.38);

      transform: translateY(-2px);
    }

    .κουμπί-κατηγορίας.επιλεγμένο {
      border-color: rgba(0, 119, 255, 0.90);

      background:
        linear-gradient(
          135deg,
          rgba(255, 255, 255, 0.12),
          rgba(0, 137, 255, 0.12)
        );

      box-shadow:
        inset 0 0 20px rgba(255, 255, 255, 0.70),
        0 0 9px rgba(255, 255, 255, 0.95),
        0 0 23px rgba(0, 125, 255, 0.62);
    }

    .κουμπί-κατηγορίας.επιλεγμένο::after {
      content: "✓";

      position: absolute;
      right: 8%;
      top: 7%;

      width: 24px;
      height: 24px;

      display: grid;
      place-items: center;

      border: 1px solid white;
      border-radius: 50%;

      color: white;
      font-size: 14px;
      font-weight: 900;

      background:
        linear-gradient(
          135deg,
          #0878ff,
          #26c9ff
        );
    }

    .σημείο {
      position: absolute;
      left: 0;

      width: 1px;
      height: 1px;

      scroll-margin-top: 92px;
    }

    #αρχική {
      top: 0;
    }

    #κατηγορίες {
      top: 0;
    }

    #προϊόντα {
      top: 24%;
    }

    #σχετικά {
      top: 72%;
    }

    #επικοινωνία {
      top: 88%;
    }

    .ειδοποίηση {
      position: fixed;
      z-index: 1600;
      left: 50%;
      bottom: 24px;

      width: min(430px, calc(100% - 28px));
      padding: 14px 17px;

      border: 1px solid rgba(255, 255, 255, 0.96);
      border-radius: 18px;

      color: white;
      text-align: center;
      font-size: 14px;
      font-weight: 800;
      line-height: 1.45;

      background:
        linear-gradient(
          135deg,
          rgba(4, 51, 142, 0.97),
          rgba(0, 132, 255, 0.96)
        );

      box-shadow:
        inset 0 1px 3px rgba(255, 255, 255, 0.65),
        0 15px 38px rgba(0, 61, 154, 0.35);

      opacity: 0;
      pointer-events: none;

      transform: translate(-50%, 18px);

      transition:
        opacity 0.25s ease,
        transform 0.25s ease;
    }

    .ειδοποίηση.φαίνεται {
      opacity: 1;

      transform: translate(-50%, 0);
    }

    @keyframes ανάσα-δαχτυλιδιού {
      0%,
      100% {
        opacity: 0.58;
        transform: scale(0.98);
      }

      50% {
        opacity: 1;
        transform: scale(1.02);
      }
    }

    @media (max-width: 900px) {
      .επάνω-εσωτερικό {
        grid-template-columns: 1fr auto;
      }

      .μενού-υπολογιστή {
        display: none;
      }

      .κουμπί-μενού {
        display: grid;
      }
    }

    @media (max-width: 560px) {
      .επάνω-μπάρα {
        padding: 5px;
      }

      .επάνω-εσωτερικό {
        min-height: 66px;
        padding: 8px 9px;
        gap: 7px;

        border-radius: 23px;
      }

      .υγρό-λογότυπο {
        width: 43px;
        height: 43px;
        flex-basis: 43px;
      }

      .υγρό-λογότυπο::before,
      .υγρό-λογότυπο::after {
        left: 6px;
        top: 14px;

        width: 31px;
        height: 12px;

        border-width: 3px;
      }

      .μάρκα {
        gap: 8px;
      }

      .όνομα-μάρκας {
        font-size: 19px;
      }

      .όνομα-δημιουργού {
        font-size: 9px;
      }

      .εργαλεία {
        gap: 4px;
      }

      .γλώσσα {
        width: 73px;
        height: 37px;
        padding: 0 4px;

        font-size: 9px;
      }

      .κουμπί-εικονίδιο {
        width: 37px;
        height: 37px;
        flex-basis: 37px;
      }

      .αναζήτηση {
        top: 80px;
        flex-direction: column;
      }

      .κουμπί-αναζήτησης {
        min-height: 43px;
      }

      .μενού-κινητού {
        grid-template-columns: 1fr;
      }

      .κουμπί-κατηγορίας {
        border-radius: 15px;
      }

      .κουμπί-κατηγορίας.επιλεγμένο::after {
        right: 4%;
        top: 4%;

        width: 18px;
        height: 18px;

        font-size: 11px;
      }
    }

    @media (max-width: 370px) {
      .όνομα-δημιουργού {
        display: none;
      }

      .όνομα-μάρκας {
        font-size: 17px;
      }

      .γλώσσα {
        display: none;
      }
    }

    @media (prefers-reduced-motion: reduce) {
      .δαχτυλίδι-γης {
        animation: none;
      }
    }
  </style>
</head>

<body>

  <header class="επάνω-μπάρα">

    <div class="επάνω-εσωτερικό">

      <a
        class="μάρκα"
        href="#αρχική"
        aria-label="GlobalLink αρχική σελίδα"
      >

        <span
          class="υγρό-λογότυπο"
          aria-hidden="true"
        ></span>

        <span>

          <span class="όνομα-μάρκας">
            GlobalLink
          </span>

          <span class="όνομα-δημιουργού">
            by Gavriil Moschidis
          </span>

        </span>
      </a>

      <nav
        class="μενού-υπολογιστή"
        aria-label="Κύριο μενού"
      >

        <a
          href="#αρχική"
          data-el="ΑΡΧΙΚΗ"
          data-en="HOME"
        >
          ΑΡΧΙΚΗ
        </a>

        <a
          href="#κατηγορίες"
          data-el="ΚΑΤΗΓΟΡΙΕΣ"
          data-en="CATEGORIES"
        >
          ΚΑΤΗΓΟΡΙΕΣ
        </a>

        <a
          href="#προϊόντα"
          data-el="ΠΡΟΪΟΝΤΑ"
          data-en="PRODUCTS"
        >
          ΠΡΟΪΟΝΤΑ
        </a>

        <a
          href="#σχετικά"
          data-el="ΣΧΕΤΙΚΑ ΜΕ ΕΜΑΣ"
          data-en="ABOUT US"
        >
          ΣΧΕΤΙΚΑ ΜΕ ΕΜΑΣ
        </a>

        <a
          href="#επικοινωνία"
          data-el="ΕΠΙΚΟΙΝΩΝΙΑ"
          data-en="CONTACT"
        >
          ΕΠΙΚΟΙΝΩΝΙΑ
        </a>

      </nav>

      <div class="εργαλεία">

        <select
          class="γλώσσα"
          id="γλώσσα"
          aria-label="Επιλογή γλώσσας"
        >

          <option value="el">
            🇬🇷 Ελληνικά
          </option>

          <option value="en">
            🇬🇧 English
          </option>

        </select>

        <button
          class="κουμπί-εικονίδιο"
          id="κουμπίΑναζήτησης"
          type="button"
          aria-label="Αναζήτηση"
        >

          <svg
            viewBox="0 0 24 24"
            aria-hidden="true"
          >

            <circle
              cx="11"
              cy="11"
              r="7"
            ></circle>

            <path d="M20 20l-4-4"></path>

          </svg>
        </button>

        <button
          class="κουμπί-εικονίδιο κουμπί-μενού"
          id="κουμπίΜενού"
          type="button"
          aria-label="Άνοιγμα μενού"
        >

          <svg
            viewBox="0 0 24 24"
            aria-hidden="true"
          >

            <path d="M4 7h16"></path>
            <path d="M4 12h16"></path>
            <path d="M4 17h16"></path>

          </svg>
        </button>

      </div>
    </div>

    <nav
      class="μενού-κινητού"
      id="μενούΚινητού"
      aria-label="Μενού κινητού"
    >

      <a href="#αρχική" data-el="ΑΡΧΙΚΗ" data-en="HOME">
        ΑΡΧΙΚΗ
      </a>

      <a
        href="#κατηγορίες"
        data-el="ΚΑΤΗΓΟΡΙΕΣ"

      >
        ΚΑΤΗΓΟΡΙΕΣ
      </a>

      <a
        href="#προϊόντα"
        data-el="ΠΡΟΪΟΝΤΑ"

      >

      </a>

      <a
        href="#σχετικά"
        data-el="ΣΧΕΤΙΚΑ ΜΕ ΕΜΑΣ"

      >
        ΣΧΕΤΙΚΑ ΜΕ ΕΜΑΣ
      </a>

      <a
        href="#επικοινωνία"
        data-el="ΕΠΙΚΟΙΝΩΝΙΑ"

  </header>

  <form
    class="αναζήτηση"
    id="φόρμαΑναζήτησης"
  >

    <input
      id="πεδίοΑναζήτησης"
      type="search"
      placeholder="Γράψε: σπίτι, αυτοκίνητο, τεχνολογία..."
      autocomplete="off"
      aria-label="Λέξη αναζήτησης"
    >

    <button
      class="κουμπί-αναζήτησης"
      id="εκτέλεσηΑναζήτησης"
      type="submit"
    >
      ΑΝΑΖΗΤΗΣΗ
    </button>

  </form>

  <main>

    <section
      class="κεντρικό-σχέδιο"
      id="αρχική"
      aria-label="GlobalLink αρχική παρουσίαση"
    >

      <img
        class="κεντρική-εικόνα"
        src="assets/homepage.png"
        alt="GlobalLink"
      >

      <span
        class="δαχτυλίδι-γης"
        aria-hidden="true"
      ></span>

      <div
        class="γυάλινη-γη"
        aria-label="Περιστρεφόμενη Γη"
      >

        <canvas
          id="καμβάςΓης"
          aria-label="Περιστρεφόμενη πραγματική Γη"
        ></canvas>

        <span
          class="γραμμές-γης"
          aria-hidden="true"
        ></span>

      </div>

    </section>

    <section
      class="κάτω-σχέδιο"
      aria-label="Κατηγορίες και προϊόντα GlobalLink"
    >

      <span class="σημείο" id="κατηγορίες"></span>
      <span class="σημείο" id="προϊόντα"></span>
      <span class="σημείο" id="σχετικά"></span>
      <span class="σημείο" id="επικοινωνία"></span>

      <img
        class="κάτω-εικόνα"
        src="assets/homepage.png"
        alt="Κατηγορίες και προϊόντα GlobalLink"
      >

      <div
        class="κουμπιά-κατηγοριών"
        aria-label="Κατηγορίες προϊόντων"
      >

        <button
          class="κουμπί-κατηγορίας"
          type="button"
          data-category="home"
          data-name-el="Σπίτι"
          data-name-en="Home"
          aria-label="Κατηγορία Σπίτι"
        ></button>

        <button
          class="κουμπί-κατηγορίας"
          type="button"
          data-category="car"
          data-name-el="Αυτοκίνητο"
          data-name-en="Car"
          aria-label="Κατηγορία Αυτοκίνητο"
        ></button>

        <button
          class="κουμπί-κατηγορίας"
          type="button"
          data-category="technology"
          data-name-el="Τεχνολογία"
          data-name-en="Technology"
          aria-label="Κατηγορία Τεχνολογία"

        <button

        <button

          data-name-el="Ταξίδι και κάμπινγκ"

          aria-label="Κατηγορία Ταξίδι και κάμπινγκ"

        <button
          class="κουμπί-κατηγορίας"
          type="button"

  <div
    class="ειδοποίηση"
    id="ειδοποίηση"
    role="status"
    aria-live="polite"
  ></div>

  <script>
    const γλώσσα =
      document.getElementById("γλώσσα");

    const κουμπίΜενού =
      document.getElementById("κουμπίΜενού");

    const μενούΚινητού =
      document.getElementById("μενούΚινητού");

    const κουμπίΑναζήτησης =
      document.getElementById("κουμπίΑναζήτησης");

    const φόρμαΑναζήτησης =
      document.getElementById("φόρμαΑναζήτησης");

    const πεδίοΑναζήτησης =
      document.getElementById("πεδίοΑναζήτησης");

    const εκτέλεσηΑναζήτησης =
      document.getElementById("εκτέλεσηΑναζήτησης");

    const ειδοποίηση =
      document.getElementById("ειδοποίηση");

    const μεταφραζόμενα =
      document.querySelectorAll(
        "[data-el][data-en]"
      );

    const κουμπιάΚατηγοριών =
      document.querySelectorAll(
        ".κουμπί-κατηγορίας"
      );

    let χρόνοςΕιδοποίησης;

    function εμφάνισεΕιδοποίηση(μήνυμα) {
      clearTimeout(χρόνοςΕιδοποίησης);

      ειδοποίηση.textContent = μήνυμα;
      ειδοποίηση.classList.add("φαίνεται");

      χρόνοςΕιδοποίησης = setTimeout(() => {
        ειδοποίηση.classList.remove("φαίνεται");
      }, 3000);
    }

    function όνομαΚατηγορίας(κουμπί) {
      return γλώσσα.value === "el"
        ? κουμπί.dataset.nameEl
        : κουμπί.dataset.nameEn;
    }

    function επίλεξεΚατηγορία(
      αναγνωριστικό,
      κύλιση = true
    ) {
      const επιλεγμένοΚουμπί =
        document.querySelector(
          `.κουμπί-κατηγορίας[data-category="${αναγνωριστικό}"]`
        );

      if (!επιλεγμένοΚουμπί) {
        return;
      }

      κουμπιάΚατηγοριών.forEach((κουμπί) => {
        κουμπί.classList.remove("επιλεγμένο");

        κουμπί.setAttribute(
          "aria-pressed",
          "false"
        );
      });

      επιλεγμένοΚουμπί.classList.add(
        "επιλεγμένο"
      );

      επιλεγμένοΚουμπί.setAttribute(
        "aria-pressed",
        "true"
      );

      localStorage.setItem(
        "globallink-category",
        αναγνωριστικό
      );

      const όνομα =
        όνομαΚατηγορίας(επιλεγμένοΚουμπί);

      εμφάνισεΕιδοποίηση(
        γλώσσα.value === "el"
          ? `Επιλέχθηκε η κατηγορία: ${όνομα}`
          : `Selected category: ${όνομα}`
      );

      if (κύλιση) {
        document
          .getElementById("προϊόντα")
          .scrollIntoView({
            behavior: "smooth",
            block: "start"
          });
      }
    }

    κουμπιάΚατηγοριών.forEach((κουμπί) => {
      κουμπί.setAttribute(
        "aria-pressed",
        "false"
      );

      κουμπί.addEventListener("click", () => {
        επίλεξεΚατηγορία(
          κουμπί.dataset.category,
          true
        );
      });
    });

    const αποθηκευμένηΚατηγορία =
      localStorage.getItem(
        "globallink-category"
      );

    if (αποθηκευμένηΚατηγορία) {
      επίλεξεΚατηγορία(
        αποθηκευμένηΚατηγορία,
        false
      );
    }

    κουμπίΜενού.addEventListener(
      "click",
      () => {
        μενούΚινητού.classList.toggle("ανοιχτό");
        φόρμαΑναζήτησης.classList.remove("ανοιχτή");
      }
    );

    μενούΚινητού
      .querySelectorAll("a")
      .forEach((σύνδεσμος) => {
        σύνδεσμος.addEventListener(
          "click",
          () => {
            μενούΚινητού.classList.remove("ανοιχτό");
          }
        );
      });

    κουμπίΑναζήτησης.addEventListener(
      "click",
      () => {
        φόρμαΑναζήτησης.classList.toggle("ανοιχτή");
        μενούΚινητού.classList.remove("ανοιχτό");

        if (
          φόρμαΑναζήτησης.classList.contains(
            "ανοιχτή"
          )
        ) {
          setTimeout(() => {
            πεδίοΑναζήτησης.focus();
          }, 100);
        }
      }
    );

    γλώσσα.addEventListener(
      "change",
      () => {
        μεταφραζόμενα.forEach((στοιχείο) => {
          στοιχείο.textContent =
            γλώσσα.value === "el"
              ? στοιχείο.dataset.el
              : στοιχείο.dataset.en;
        });

        if (γλώσσα.value === "el") {
          πεδίοΑναζήτησης.placeholder =
            "Γράψε: σπίτι, αυτοκίνητο, τεχνολογία...";

          εκτέλεσηΑναζήτησης.textContent =
            "ΑΝΑΖΗΤΗΣΗ";

          εμφάνισεΕιδοποίηση(
            "Η γλώσσα άλλαξε σε Ελληνικά."
          );
        } else {
          πεδίοΑναζήτησης.placeholder =
            "Search: home, car, technology...";

          εκτέλεσηΑναζήτησης.textContent =
            "SEARCH";

          εμφάνισεΕιδοποίηση(
            "Language changed to English."
          );
        }
      }
    );

    φόρμαΑναζήτησης.addEventListener(
      "submit",
      (γεγονός) => {
        γεγονός.preventDefault();

        const λέξη =
          πεδίοΑναζήτησης.value
            .trim()
            .toLocaleLowerCase("el-GR");

        if (!λέξη) {
          εμφάνισεΕιδοποίηση(
            γλώσσα.value === "el"
              ? "Γράψε πρώτα τι θέλεις να αναζητήσεις."
              : "Type what you want to search for."
          );

          return;
        }

        if (
          λέξη.includes("σπίτ") ||
          λέξη.includes("home")
        ) {
          επίλεξεΚατηγορία("home");
        } else if (
          λέξη.includes("αυτοκ") ||
          λέξη.includes("αμάξ") ||
          λέξη.includes("car")
        ) {
          επίλεξεΚατηγορία("car");
        } else if (
          λέξη.includes("τεχνο") ||
          λέξη.includes("κινητ") ||
          λέξη.includes("technology") ||
          λέξη.includes("phone")
        ) {
          επίλεξεΚατηγορία("technology");
        } else if (
          λέξη.includes("εργαλ") ||
          λέξη.includes("δραπα") ||
          λέξη.includes("tool")
        ) {
          επίλεξεΚατηγορία("tools");
        } else if (
          λέξη.includes("ταξίδ") ||
          λέξη.includes("κάμπ") ||
          λέξη.includes("σκην") ||
          λέξη.includes("travel") ||
          λέξη.includes("camp")
        ) {
          επίλεξεΚατηγορία("travel");
        } else if (
          λέξη.includes("δώρ") ||
          λέξη.includes("gift")
        ) {
          επίλεξεΚατηγορία("gifts");
        } else {
          εμφάνισεΕιδοποίηση(
            γλώσσα.value === "el"
              ? "Δεν βρέθηκε ακόμη αυτή η αναζήτηση."
              : "This search is not available yet."
          );

          return;
        }

        φόρμαΑναζήτησης.classList.remove(
          "ανοιχτή"
        );
      }
    );

    document.addEventListener(
      "click",
      (γεγονός) => {
        const πάτησεΑναζήτηση =
          φόρμαΑναζήτησης.contains(
            γεγονός.target
          ) ||
          κουμπίΑναζήτησης.contains(
            γεγονός.target
          );

        const πάτησεΜενού =
          μενούΚινητού.contains(
            γεγονός.target
          ) ||
          κουμπίΜενού.contains(
            γεγονός.target
          );

        if (!πάτησεΑναζήτηση) {
          φόρμαΑναζήτησης.classList.remove(
            "ανοιχτή"
          );
        }

        if (!πάτησεΜενού) {
          μενούΚινητού.classList.remove(
            "ανοιχτό"
          );
        }
      }
    );

    /*
      Πραγματική περιστρεφόμενη Γη.
      Ο χάρτης κινείται επάνω σε σφαιρική προβολή.
    */

    const καμβάς =
      document.getElementById("καμβάςΓης");

    const πλαίσιο =
      καμβάς.getContext(
        "2d",
        {
          alpha: true
        }
      );

    const χάρτης =
      new Image();

    χάρτης.src =
      "assets/earth-map.jpg";

    let προηγούμενοΚαρέ = 0;

    function προσαρμογήΚαμβά() {
      const ορθογώνιο =
        καμβάς.getBoundingClientRect();

      const μέγεθος =
        Math.min(
          520,
          Math.max(
            280,
            Math.round(
              ορθογώνιο.width * 1.3
            )
          )
        );

      if (
        καμβάς.width !== μέγεθος ||
        καμβάς.height !== μέγεθος
      ) {
        καμβάς.width = μέγεθος;
        καμβάς.height = μέγεθος;
      }
    }

    function σχεδίασεΓη(χρόνος) {
      requestAnimationFrame(σχεδίασεΓη);

      if (χρόνος - προηγούμενοΚαρέ < 45) {
        return;
      }

      προηγούμενοΚαρέ = χρόνος;

      if (!χάρτης.complete) {
        return;
      }

      προσαρμογήΚαμβά();

      const μέγεθος = καμβάς.width;
      const ακτίνα = μέγεθος / 2;
      const κέντρο = ακτίνα;

      πλαίσιο.clearRect(
        0,
        0,
        μέγεθος,
        μέγεθος
      );

      πλαίσιο.save();

      πλαίσιο.beginPath();

      πλαίσιο.arc(
        κέντρο,
        κέντρο,
        ακτίνα - 2,
        0,
        Math.PI * 2
      );

      πλαίσιο.clip();

      const ωκεανός =
        πλαίσιο.createRadialGradient(
          ακτίνα * 0.35,
          ακτίνα * 0.28,
          ακτίνα * 0.05,
          ακτίνα,
          ακτίνα,
          ακτίνα
        );

      ωκεανός.addColorStop(
        0,
        "#7ee4ff"
      );

      ωκεανός.addColorStop(
        0.48,
        "#087be8"
      );

      ωκεανός.addColorStop(
        1,
        "#021b72"
      );

      πλαίσιο.fillStyle = ωκεανός;

      πλαίσιο.fillRect(
        0,
        0,
        μέγεθος,
        μέγεθος
      );

      /*
        Μία πλήρης περιστροφή περίπου
        κάθε εξήντα δευτερόλεπτα.
        Η αρχική θέση δείχνει Ευρώπη και Αφρική.
      */

      const περιστροφή =
        (
          0.50 +
          χρόνος / 60000
        ) % 1;

      const βήμα =
        μέγεθος > 420
          ? 2
          : 1;

      const πλάτοςΧάρτη =
        χάρτης.naturalWidth;

      const ύψοςΧάρτη =
        χάρτης.naturalHeight;

      for (
        let x = 0;
        x < μέγεθος;
        x += βήμα
      ) {
        const κανονικόΧ =
          (x - ακτίνα) / ακτίνα;

        if (
          κανονικόΧ <= -1 ||
          κανονικόΧ >= 1
        ) {
          continue;
        }

        const γωνία =
          Math.asin(κανονικόΧ);

        let θέσηΧάρτη =
          περιστροφή +
          γωνία / (Math.PI * 2);

        θέσηΧάρτη =
          (
            θέσηΧάρτη % 1 +
            1
          ) % 1;

        const πηγήΧ =
          Math.floor(
            θέσηΧάρτη *
            πλάτοςΧάρτη
          );

        const μισόΎψος =
          Math.sqrt(
            1 -
            κανονικόΧ *
            κανονικόΧ
          ) * ακτίνα;

        const επάνω =
          ακτίνα -
          μισόΎψος;

        const ύψος =
          μισόΎψος * 2;

        πλαίσιο.drawImage(
          χάρτης,
          πηγήΧ,
          0,
          1,
          ύψοςΧάρτη,
          x,
          επάνω,
          βήμα + 1,
          ύψος
        );
      }

      πλαίσιο.restore();

      /*
        Φωτισμός υγρού γυαλιού.
      */

      const φωτισμός =
        πλαίσιο.createRadialGradient(
          ακτίνα * 0.38,
          ακτίνα * 0.25,
          ακτίνα * 0.04,
          ακτίνα,
          ακτίνα,
          ακτίνα
        );

      φωτισμός.addColorStop(
        0,
        "rgba(255,255,255,0.46)"
      );

      φωτισμός.addColorStop(
        0.42,
        "rgba(255,255,255,0.04)"
      );

      φωτισμός.addColorStop(
        1,
        "rgba(0,20,95,0.46)"
      );

      πλαίσιο.fillStyle =
        φωτισμός;

      πλαίσιο.beginPath();

      πλαίσιο.arc(
        ακτίνα,
        ακτίνα,
        ακτίνα - 2,
        0,
        Math.PI * 2
      );

      πλαίσιο.fill();

      πλαίσιο.strokeStyle =
        "rgba(232,253,255,0.95)";

      πλαίσιο.lineWidth = 3;

      πλαίσιο.beginPath();

      πλαίσιο.arc(
        ακτίνα,
        ακτίνα,
        ακτίνα - 3,
        0,
        Math.PI * 2
      );

      πλαίσιο.stroke();
    }

    χάρτης.addEventListener(
      "load",
      () => {
        προσαρμογήΚαμβά();

        requestAnimationFrame(
          σχεδίασεΓη
        );
      }
    );

    χάρτης.addEventListener(
      "error",
      () => {
        εμφάνισεΕιδοποίηση(
          "Δεν φορτώθηκε ο χάρτης της Γης."
        );
      }
    );

    window.addEventListener(
      "resize",
      προσαρμογήΚαμβά
    );
  </script>

</body>
